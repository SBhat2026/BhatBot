# Fly.io deploy config. `fly launch --no-deploy` then `fly deploy`. Set secrets with:
#   fly secrets set BHATBOT_TOKEN=... ANTHROPIC_API_KEY=... ELEVENLABS_API_KEY=... OPENAI_API_KEY=...
app = "bhatbot-cloud"
primary_region = "ewr"  # Newark — close to NJ

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine ALWAYS up: the Mac-executor WebSocket relay + the proactive scheduler must
  # stay alive (a scaled-to-zero machine would drop the Mac socket and miss schedules).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Durable conversation history. Create the volume once (same region as the app):
#   fly volumes create bhatbot_data --region ewr --size 1
# Without a volume the app still runs (history persists only within a machine's lifetime).
[mounts]
  source = "bhatbot_data"
  destination = "/data"

[env]
  DATA_DIR = "/data"
