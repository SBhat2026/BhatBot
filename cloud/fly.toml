# fly.toml app configuration file generated for bhatbot-cloud on 2026-06-18T14:13:09-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bhatbot-cloud'
primary_region = 'ewr'

[build]

[env]
  DATA_DIR = '/data'
  TZ = 'America/New_York'   # so schedule times like "08:00" mean 8 AM Eastern, not UTC

[[mounts]]
  source = 'bhatbot_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
