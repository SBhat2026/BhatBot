<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bhatbot">
<meta name="theme-color" content="#090d13">
<title>Bhatbot</title>
<link rel="manifest" id="manifest">
<link rel="apple-touch-icon" id="touchicon">
<style>
  :root { --bg:#090d13; --panel:#0e141d; --line:#1b2735; --cyan:#39d7ff; --txt:#dce6f0; --dim:#6f8198; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; overscroll-behavior:none; }
  body { display:flex; flex-direction:column; }
  header { display:flex; align-items:center; gap:10px; padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
    border-bottom:1px solid var(--line); background:linear-gradient(180deg,#0c1219,#090d13); }
  header .dot { width:9px; height:9px; border-radius:50%; background:var(--cyan); box-shadow:0 0 10px var(--cyan); }
  header .dot.off { background:#7a4; box-shadow:none; }
  header b { font-weight:600; letter-spacing:.5px; }
  header small { color:var(--dim); margin-left:auto; font-size:12px; }
  #log { flex:1; overflow-y:auto; padding:16px 12px 8px; -webkit-overflow-scrolling:touch; }
  .msg { max-width:86%; margin:8px 0; padding:10px 13px; border-radius:16px; white-space:pre-wrap; word-wrap:break-word; }
  .me { margin-left:auto; background:#13283a; border:1px solid #1d3a52; border-bottom-right-radius:4px; }
  .bot { margin-right:auto; background:var(--panel); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .err { margin-right:auto; background:#2a1416; border:1px solid #4a2126; color:#ff9aa2; }
  .thinking { color:var(--dim); font-style:italic; }
  footer { padding:8px 10px calc(env(safe-area-inset-bottom) + 8px); border-top:1px solid var(--line); background:#0c1219; }
  #bar { color:var(--dim); font-size:12px; min-height:16px; padding:0 6px 4px; }
  #attbar { display:flex; flex-wrap:wrap; gap:6px; padding:0 4px 6px; }
  #attbar:empty { display:none; }
  .attchip { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--cyan);
    border:1px solid #1b4a5e; border-radius:12px; padding:3px 10px; background:rgba(57,215,255,.07); }
  .attchip .x { color:var(--dim); }
  .row { display:flex; align-items:flex-end; gap:8px; }
  textarea { flex:1; resize:none; max-height:120px; background:var(--panel); color:var(--txt);
    border:1px solid var(--line); border-radius:20px; padding:10px 14px; font:inherit; outline:none; }
  textarea:focus { border-color:var(--cyan); }
  button { flex:0 0 auto; width:44px; height:44px; border-radius:50%; border:1px solid var(--line);
    background:var(--panel); color:var(--txt); font-size:19px; display:grid; place-items:center; }
  button:active { transform:scale(.92); }
  #mic.rec { background:var(--cyan); color:#04222e; border-color:var(--cyan); animation:pulse 1.2s infinite; }
  #mic.hot { background:#1b3a4a; border-color:var(--cyan); color:var(--cyan); }
  #spk.off { opacity:.4; }
  #send { background:var(--cyan); color:#04222e; border-color:var(--cyan); font-size:17px; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(57,215,255,.5);} 50%{ box-shadow:0 0 0 12px rgba(57,215,255,0);} }
  .hbtn { width:32px; height:32px; font-size:16px; border-radius:9px; margin-left:8px; }
  /* voice settings bottom-sheet */
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:flex-end; z-index:50; }
  .sheet { width:100%; background:var(--panel); border-top:1px solid var(--line);
    border-radius:18px 18px 0 0; padding:18px 18px calc(env(safe-area-inset-bottom) + 22px); }
  .sh-h { display:flex; align-items:center; font-weight:600; letter-spacing:.4px; margin-bottom:14px; font-size:16px; }
  .sh-h .x { margin-left:auto; color:var(--dim); width:30px; height:30px; display:grid; place-items:center; border:1px solid var(--line); border-radius:8px; font-size:14px; }
  .sheet label { display:block; color:var(--dim); font-size:13px; margin:14px 0 6px; }
  .sheet select { width:100%; background:var(--bg); color:var(--txt); border:1px solid var(--line);
    border-radius:10px; padding:11px 12px; font:inherit; outline:none; }
  .sheet input[type=range] { width:100%; accent-color:var(--cyan); }
  .testbtn { width:100%; height:auto; border-radius:12px; padding:12px; margin-top:18px; font-size:15px;
    background:rgba(57,215,255,.1); border:1px solid #1b4a5e; color:var(--cyan); }
  /* tabbed views */
  #views { flex:1; min-height:0; display:flex; position:relative; }
  .view { position:absolute; inset:0; display:none; flex-direction:column; }
  .view.on { display:flex; }
  #view-nexus iframe { flex:1; width:100%; border:0; background:#090d13; }
  #actfeed { flex:1; overflow-y:auto; padding:12px; -webkit-overflow-scrolling:touch; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px; }
  .act { display:flex; gap:8px; padding:7px 9px; margin:5px 0; border:1px solid var(--line); border-radius:9px; background:var(--panel); }
  .act .k { color:var(--cyan); flex:0 0 auto; font-size:11px; opacity:.8; }
  .act .v { color:var(--txt); word-break:break-word; white-space:pre-wrap; }
  #actfeed .empty { color:var(--dim); text-align:center; margin-top:40px; }
  /* bottom tab bar */
  #tabs { display:flex; border-top:1px solid var(--line); background:#0c1219; padding-bottom:env(safe-area-inset-bottom); }
  #tabs .tab { flex:1; text-align:center; padding:9px 4px 8px; color:var(--dim); font-size:10px; letter-spacing:.4px; }
  #tabs .tab .ic { display:block; font-size:19px; margin-bottom:2px; filter:grayscale(1) opacity(.7); }
  #tabs .tab.on { color:var(--cyan); }
  #tabs .tab.on .ic { filter:none; }
  #tabs .tab .badge { display:inline-block; min-width:15px; padding:0 4px; margin-left:3px; font-size:10px; color:#04222e; background:var(--cyan); border-radius:8px; vertical-align:top; }
  #mic.wake { background:#1b3a4a; border-color:var(--cyan); color:var(--cyan); }
  /* Control tab — desktop screen, jobs, quick actions */
  #view-control { overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px; display:block; }
  .csec { color:var(--dim); font-size:11px; letter-spacing:.12em; margin:14px 2px 7px; }
  #screenwrap { border:1px solid var(--line); border-radius:10px; overflow:hidden; background:#000; position:relative; min-height:90px; }
  #screenimg { display:block; width:100%; transition:opacity .2s; }
  #screenhint { position:absolute; bottom:6px; right:9px; color:var(--dim); font-size:10px; background:rgba(0,0,0,.55); padding:2px 7px; border-radius:6px; }
  .qgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .qbtn { height:54px; width:100%; border-radius:11px; font-size:13px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
  .qbtn .qi { font-size:19px; }
  .jcard { border:1px solid var(--line); border-left:3px solid #1b4a5e; border-radius:10px; background:var(--panel); padding:9px 11px; margin-bottom:8px; }
  .jcard[data-status="running"] { border-left-color:var(--cyan); }
  .jcard[data-status="done"] { border-left-color:#3ad98b; opacity:.7; }
  .jcard[data-status="failed"] { border-left-color:#ff5d7a; }
  .jcard[data-status="blocked"] { border-left-color:#e8b339; }
  .jcard[data-status="cancelled"] { opacity:.45; }
  .jtop { display:flex; justify-content:space-between; gap:8px; font-size:13px; }
  .jtop .js { color:var(--dim); font-size:10px; text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; }
  .jprog { height:3px; background:rgba(255,255,255,.08); border-radius:2px; margin:7px 0 5px; overflow:hidden; }
  .jprog i { display:block; height:100%; background:var(--cyan); }
  .jnote { color:var(--dim); font-size:11.5px; word-break:break-word; }
  .jbtns { display:flex; gap:8px; margin-top:7px; }
  .jbtns button { width:auto; height:30px; border-radius:8px; font-size:12px; padding:0 12px; }
  #shellrow { display:flex; gap:8px; }
  #shellrow input { flex:1; background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font:inherit; outline:none; }
  #shellrow button { width:auto; padding:0 14px; border-radius:10px; font-size:13px; }
  #shellout { font-family:ui-monospace,Menlo,monospace; font-size:11.5px; color:var(--txt); background:#000; border:1px solid var(--line); border-radius:9px; padding:9px; margin-top:8px; white-space:pre-wrap; word-break:break-all; max-height:160px; overflow:auto; display:none; }
</style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span><b>BHATBOT</b>
  <small id="net">connecting…</small>
  <button id="gear" class="hbtn" title="Voice settings">⚙</button>
</header>
<div id="views">
<section id="view-chat" class="view on">
<div id="log"></div>
<footer>
  <div id="bar"></div>
  <div id="attbar"></div>
  <div class="row">
    <button id="spk" title="Voice replies">🔊</button>
    <button id="wake" title="Wake word — say &quot;hey BhatBot&quot;">👂</button>
    <button id="mic" title="Hands-free conversation">🎙</button>
    <button id="attach" title="Attach photo / screenshot / screen recording">📎</button>
    <textarea id="ta" rows="1" placeholder="Message Bhatbot…" enterkeyhint="send"></textarea>
    <button id="send" title="Send">➤</button>
  </div>
  <input type="file" id="file" accept="image/*,video/*" multiple style="display:none">
</footer>
</section>
<section id="view-activity" class="view"><div id="actfeed"><div class="empty">No activity yet.</div></div></section>
<section id="view-control" class="view">
  <div class="csec">DESKTOP SCREEN <span style="float:right;color:var(--cyan)" id="screenrefresh">⟳ refresh</span></div>
  <div id="screenwrap"><img id="screenimg" alt=""><span id="screenhint">tap to refresh</span></div>
  <div class="csec">QUICK ACTIONS</div>
  <div class="qgrid">
    <button class="qbtn" data-q="playpause"><span class="qi">⏯</span>Play/Pause</button>
    <button class="qbtn" data-q="next"><span class="qi">⏭</span>Next</button>
    <button class="qbtn" data-q="voldown"><span class="qi">🔉</span>Vol −</button>
    <button class="qbtn" data-q="volup"><span class="qi">🔊</span>Vol +</button>
    <button class="qbtn" data-q="mute"><span class="qi">🔇</span>Mute</button>
    <button class="qbtn" data-q="nowplaying"><span class="qi">🎵</span>Playing?</button>
    <button class="qbtn" data-q="sleepdisplay"><span class="qi">🌙</span>Sleep screen</button>
    <button class="qbtn" data-q="lock"><span class="qi">🔒</span>Lock Mac</button>
  </div>
  <div class="csec">BACKGROUND JOBS</div>
  <div id="jobsbox"><div class="empty" style="color:var(--dim);text-align:center;padding:14px 0;font-size:12.5px">No jobs yet.</div></div>
  <div class="csec">SHELL</div>
  <div id="shellrow"><input id="shellcmd" placeholder="command on the Mac… (e.g. git -C ~/bhatbot status)" autocapitalize="off" autocorrect="off"><button id="shellrun">Run</button></div>
  <pre id="shellout"></pre>
</section>
<section id="view-nexus" class="view"></section>
</div>
<nav id="tabs">
  <div class="tab on" data-tab="chat"><span class="ic">💬</span>Chat</div>
  <div class="tab" data-tab="activity"><span class="ic">⚡</span>Activity<span class="badge" id="actbadge" style="display:none">0</span></div>
  <div class="tab" data-tab="control"><span class="ic">🖥</span>Control</div>
  <div class="tab" data-tab="nexus"><span class="ic">🔭</span>Nexus</div>
</nav>
<div id="settings" class="modal" style="display:none">
  <div class="sheet">
    <div class="sh-h">Voice <span class="x" id="setclose">✕</span></div>
    <label for="voicesel">Voice</label>
    <select id="voicesel">
      <optgroup label="British — male">
        <option value="bm_george">George (British, deep — JARVIS)</option>
        <option value="bm_lewis">Lewis (British)</option>
        <option value="bm_daniel">Daniel (British)</option>
        <option value="bm_fable">Fable (British)</option>
      </optgroup>
      <optgroup label="British — female">
        <option value="bf_emma">Emma (British)</option>
        <option value="bf_isabella">Isabella (British)</option>
      </optgroup>
      <optgroup label="American">
        <option value="am_michael">Michael (US, male)</option>
        <option value="am_adam">Adam (US, male)</option>
        <option value="af_bella">Bella (US, female)</option>
        <option value="af_nicole">Nicole (US, female)</option>
      </optgroup>
    </select>
    <label for="spdrange">Speed — <span id="spdval">1.0×</span> <span style="color:var(--dim)">(lower = calmer)</span></label>
    <input id="spdrange" type="range" min="0.6" max="1.4" step="0.05" value="1">
    <button id="vtest" class="testbtn">▶ Test voice</button>
  </div>
</div>
<script>
// ---- config + endpoints ----
// Served by the Mac (Safari/PWA): same-origin, token from the /app/<token> path — unchanged.
// Bundled in the native app: the shell injects window.__BHATBOT__ = {host, token, bundled}
// so a file:// page can target the Mac (or later a cloud backend) by absolute URL. Defaults
// below keep the existing served path byte-for-byte identical.
const CFG = (typeof window !== 'undefined' && window.__BHATBOT__) || {};
const TOKEN = CFG.token || location.pathname.split('/')[2] || '';
const HOST = String(CFG.host || location.origin).replace(/\/+$/, '');
const API = HOST + '/api/' + TOKEN;
const APP = HOST + '/app/' + TOKEN;
const BUILD = '__BUILD__';                       // injected at serve time; drives auto-reload
const BUNDLED = !!CFG.bundled || location.protocol === 'file:';   // native app's local fallback
document.getElementById('manifest').href = APP + '/manifest.webmanifest';
document.getElementById('touchicon').href = APP + '/icon-192.png';

// Installable PWA: register a real caching service worker so the home-screen app launches
// instantly and works if the Mac is briefly unreachable. Skipped when bundled (a file://
// origin can't register a cross-origin SW — the native shell handles offline instead).
if (!BUNDLED && 'serviceWorker' in navigator) navigator.serviceWorker.register('/app/' + TOKEN + '/sw.js', { scope: '/app/' + TOKEN }).catch(()=>{});
let _updating = false;
async function checkUpdate() {
  if (BUNDLED) return;                           // reloading a bundled file can't fetch new code
  try {
    const v = await fetch(APP + '/version', { cache: 'no-store' }).then(r => r.json()).then(j => j.version);
    if (v && v !== BUILD && !_updating) {
      _updating = true;
      // New build → drop the SW cache so the fresh shell loads, then reload.
      try { const ks = await caches.keys(); await Promise.all(ks.map(k => caches.delete(k))); } catch {}
      location.reload();
    }
  } catch {}
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) checkUpdate(); });
setInterval(checkUpdate, 60000);
setTimeout(checkUpdate, 3000);

const log = document.getElementById('log'), ta = document.getElementById('ta'), bar = document.getElementById('bar');
const mic = document.getElementById('mic'), spk = document.getElementById('spk'), sendBtn = document.getElementById('send');
const dot = document.getElementById('dot'), net = document.getElementById('net');
let ttsOn = true, busy = false;

function add(cls, text) { const d = document.createElement('div'); d.className = 'msg ' + cls; d.textContent = text; log.appendChild(d); log.scrollTop = log.scrollHeight; return d; }
function autoresize() { ta.style.height = 'auto'; ta.style.height = Math.min(120, ta.scrollHeight) + 'px'; }
ta.addEventListener('input', autoresize);
ta.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ensureCtx(); send(); } });
sendBtn.addEventListener('click', () => { ensureCtx(); send(); });

fetch(HOST + '/health').then(r => r.json()).then(() => { net.textContent = 'online'; dot.classList.remove('off'); })
  .catch(() => { net.textContent = 'Mac offline'; dot.classList.add('off'); });

// ---- ONE AudioContext, unlocked on first gesture — fixes iOS mic + TTS playback ----
let actx = null;
function ensureCtx() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch {} }
  if (actx && actx.state === 'suspended') actx.resume().catch(()=>{});
  return actx;
}
document.body.addEventListener('touchstart', ensureCtx, { passive: true });
document.body.addEventListener('click', ensureCtx);

// ---- chat ----
// ---- attachments: upload to /attach → vision blocks for the next message ----
let pendingBlocks = [];
function renderAtt() {
  const bar = document.getElementById('attbar'); bar.innerHTML = '';
  if (!pendingBlocks.length) return;
  const imgs = pendingBlocks.filter(b => b.type === 'image').length;
  const c = document.createElement('span'); c.className = 'attchip';
  c.innerHTML = '📎 ' + imgs + ' image' + (imgs !== 1 ? 's' : '') + ' <span class="x">✕</span>';
  c.querySelector('.x').addEventListener('click', () => { pendingBlocks = []; renderAtt(); });
  bar.appendChild(c);
}
document.getElementById('attach').addEventListener('click', () => { ensureCtx(); document.getElementById('file').click(); });
document.getElementById('file').addEventListener('change', async (e) => {
  const files = [...e.target.files]; e.target.value = '';
  if (!files.length) return;
  bar.textContent = '⏳ uploading ' + files.length + ' file' + (files.length > 1 ? 's' : '') + '…';
  for (const f of files) {
    try {
      const buf = await f.arrayBuffer();
      const r = await fetch(API + '/attach?mime=' + encodeURIComponent(f.type || 'application/octet-stream'),
        { method: 'POST', headers: { 'content-type': f.type || 'application/octet-stream' }, body: buf }).then(x => x.json());
      if (r.blocks) pendingBlocks.push(...r.blocks);
      else if (r.error) add('err', 'Attach: ' + r.error);
    } catch (err) { add('err', 'Attach: ' + (err.message || err)); }
  }
  bar.textContent = ''; renderAtt();
});

let lastFullReply = '';
async function send(forced) {
  const text = (forced != null ? forced : ta.value).trim();
  if (!text && !pendingBlocks.length) return false; if (busy) return false;
  // "read the whole/entire/full response" → re-read the last reply in full, don't query the agent
  if (/^\s*(read|play|speak)( me| it| out| aloud)*( the)?( whole| entire| full| complete)( response| reply| answer| thing| text)?\.?\s*$/i.test(text)) {
    ta.value = ''; autoresize();
    if (lastFullReply) await speak(lastFullReply, { full: true }); else bar.textContent = 'nothing to read yet';
    return true;
  }
  busy = true; ta.value = ''; autoresize();
  const blocks = pendingBlocks; pendingBlocks = []; renderAtt();
  const nImg = blocks.filter(b => b.type === 'image').length;
  add('me', text + (nImg ? `  📎 ${nImg} image${nImg > 1 ? 's' : ''}` : ''));
  const t = add('bot thinking', '…');
  try {
    const r = await fetch(API + '/chat', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ text, blocks }) }).then(x => x.json());
    if (r.error) { t.remove(); add('err', r.error); }
    else {
      t.className = 'msg bot'; t.textContent = r.text || '(no output)';
      if ((r.text || '').length > 300) addReadFull(t, r.text);
      await speak(r.text || '');
    }
  } catch (e) { t.remove(); add('err', String(e.message || e)); }
  log.scrollTop = log.scrollHeight; busy = false; return true;
}
function addReadFull(bubble, fullText) {
  const b = document.createElement('div');
  b.textContent = '🔊 read full reply';
  b.style.cssText = 'display:inline-block;margin-top:7px;font-size:13px;color:var(--cyan);border:1px solid #1b4a5e;border-radius:6px;padding:3px 9px;';
  b.addEventListener('click', () => speak(fullText, { full: true }));
  bubble.appendChild(document.createElement('br')); bubble.appendChild(b);
}

// ---- TTS: Jarvis voice, sentence-streamed, played via Web Audio (iOS-safe) ----
let ttsSeq = 0, curSrc = null;
function splitSentences(text) {
  const clean = String(text || '').replace(/```[\s\S]*?```/g, ' (code block) ').replace(/[*_`#>]/g, '').trim();
  const parts = clean.match(/[^.!?\n]+[.!?]?(\s|$)|[^.!?\n]+$/g) || [];
  const out = []; let buf = '';
  for (let p of parts) { p = p.trim(); if (!p) continue; buf = buf ? buf + ' ' + p : p; if (buf.length >= 60 || /[.!?]$/.test(p)) { out.push(buf); buf = ''; } }
  if (buf) out.push(buf);
  return out.filter(s => s.length);
}
function b64ToBuf(b64) { const bin = atob(b64), len = bin.length, u = new Uint8Array(len); for (let i=0;i<len;i++) u[i] = bin.charCodeAt(i); return u.buffer; }
function stopSpeaking() { ttsSeq++; if (curSrc) { try { curSrc.stop(); } catch {} curSrc = null; } }
// Voice prefs (persisted) — customizable from the ⚙ settings panel.
let voicePref = localStorage.getItem('bb_voice') || 'bm_george';
let speedPref = parseFloat(localStorage.getItem('bb_speed') || '1');
async function ttsOne(s) {
  try { const r = await fetch(API + '/tts', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ text: s, voice: voicePref, speed: speedPref }) }).then(x => x.json()); return (r && r.audio) ? b64ToBuf(r.audio) : null; }
  catch { return null; }
}
function playBuf(arrBuf, seq) {
  return new Promise((res) => {
    const ctx = ensureCtx();
    if (!ctx || seq !== ttsSeq) return res();
    ctx.decodeAudioData(arrBuf.slice(0), (audio) => {
      if (seq !== ttsSeq) return res();
      const s = ctx.createBufferSource(); s.buffer = audio; s.connect(ctx.destination); curSrc = s;
      s.onended = () => res(); s.start();
    }, () => res());
  });
}
async function speak(text, opts = {}) {
  if (!ttsOn) return;
  lastFullReply = String(text || '');
  let spoken = lastFullReply;
  if (!opts.full && spoken.length > 300) {
    try { const r = await fetch(API + '/summarize', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ text: spoken }) }).then(x => x.json()); if (r && r.text) spoken = r.text; } catch {}
  }
  stopSpeaking(); const seq = ++ttsSeq;
  // Short text → ONE synth call = continuous natural prosody (sentence-chunking resets
  // intonation each time → robotic). Only long full-reads stream chunks for fast start.
  const chunks = spoken.trim().length <= 350 ? [spoken.trim()] : splitSentences(spoken);
  if (!chunks.length) return;
  const jobs = chunks.map(ttsOne);
  for (let i = 0; i < jobs.length; i++) { const b = await jobs[i]; if (seq !== ttsSeq) return; if (b) await playBuf(b, seq); if (seq !== ttsSeq) return; }
}
spk.addEventListener('click', () => { ttsOn = !ttsOn; spk.classList.toggle('off', !ttsOn); spk.textContent = ttsOn ? '🔊' : '🔇'; if (!ttsOn) stopSpeaking(); });

// ---- Voice settings (persisted in localStorage, sent with every /tts) ----
const settings = document.getElementById('settings'), voicesel = document.getElementById('voicesel');
const spdrange = document.getElementById('spdrange'), spdval = document.getElementById('spdval');
voicesel.value = voicePref; spdrange.value = String(speedPref); spdval.textContent = speedPref.toFixed(2) + '×';
document.getElementById('gear').addEventListener('click', () => { ensureCtx(); settings.style.display = 'flex'; });
document.getElementById('setclose').addEventListener('click', () => settings.style.display = 'none');
settings.addEventListener('click', (e) => { if (e.target === settings) settings.style.display = 'none'; });
voicesel.addEventListener('change', () => { voicePref = voicesel.value; localStorage.setItem('bb_voice', voicePref); });
spdrange.addEventListener('input', () => { speedPref = parseFloat(spdrange.value); spdval.textContent = speedPref.toFixed(2) + '×'; localStorage.setItem('bb_speed', String(speedPref)); });
document.getElementById('vtest').addEventListener('click', async () => {
  ensureCtx(); stopSpeaking(); const seq = ++ttsSeq;
  const b = await ttsOne("Good evening, sir. This is how I shall sound."); if (b && seq === ttsSeq) playBuf(b, seq);
});

// ---- STT: hands-free conversation loop. WAV capture via Web Audio (iOS-safe). ----
// Mic tap starts a CONVERSATION: it listens, sends, speaks the reply, then listens
// again — and keeps waiting until YOU actually speak (never times out on silence
// before you've said anything). Tap again to end the conversation.
let convoActive = false, wakeMode = false, listening = false, micStream = null, proc = null, srcNode = null, muteNode = null;
let recChunks = [], heardSpeech = false, silenceAt = 0, capRate = 16000;
const SILENCE_MS = 1600, SPEECH_RMS = 0.03;

function setMicUI() {
  mic.classList.toggle('rec', listening);
  mic.classList.toggle('hot', convoActive && !listening);
  mic.textContent = (convoActive || listening) ? '⏹' : '🎙';
}
mic.addEventListener('click', () => {
  ensureCtx();
  if (convoActive || listening) { convoActive = false; stopSpeaking(); stopListening(); bar.textContent = ''; setMicUI(); }
  else { convoActive = true; stopSpeaking(); setMicUI(); startListening(); }
});

// 👂 Wake-word mode: keeps the mic open and only acts when you say "hey BhatBot" /
// "hey Jarvis". Foreground only (a web app can't listen with the screen off) — when
// the BhatBot app is open on top, just speak the wake word, no tapping.
const wakeBtn = document.getElementById('wake');
wakeBtn.addEventListener('click', () => {
  ensureCtx();
  wakeMode = !wakeMode;
  wakeBtn.classList.toggle('wake', wakeMode);
  if (wakeMode) {
    bar.textContent = '👂 waiting for "hey BhatBot"…';
    if (!listening && !convoActive) startListening();
  } else {
    if (!convoActive) { stopListening(); bar.textContent = ''; }
    setMicUI();
  }
  setMicUI();
});

async function startListening() {
  if (listening) return;
  const ctx = ensureCtx(); if (!ctx) { add('err', 'No audio support'); convoActive = false; setMicUI(); return; }
  try { micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } }); }
  catch (e) { add('err', 'Mic blocked: ' + e.message); convoActive = false; setMicUI(); return; }
  listening = true; heardSpeech = false; recChunks = []; capRate = ctx.sampleRate; silenceAt = Date.now();
  setMicUI(); bar.textContent = '🎙 listening…';
  srcNode = ctx.createMediaStreamSource(micStream);
  proc = ctx.createScriptProcessor(4096, 1, 1);
  muteNode = ctx.createGain(); muteNode.gain.value = 0;          // keep the graph running silently
  srcNode.connect(proc); proc.connect(muteNode); muteNode.connect(ctx.destination);
  proc.onaudioprocess = (e) => {
    if (!listening) return;
    const ch = e.inputBuffer.getChannelData(0);
    recChunks.push(new Float32Array(ch));
    let s = 0; for (let i = 0; i < ch.length; i++) s += ch[i] * ch[i];
    const rms = Math.sqrt(s / ch.length); const now = Date.now();
    if (rms > SPEECH_RMS) { heardSpeech = true; silenceAt = now; bar.textContent = '🎙 listening…'; }
    else if (heardSpeech && now - silenceAt > SILENCE_MS) { stopListening(); }   // only stops AFTER you've spoken
  };
}
function stopListening() {
  if (!listening) return; listening = false;
  try { proc && (proc.onaudioprocess = null); proc && proc.disconnect(); srcNode && srcNode.disconnect(); muteNode && muteNode.disconnect(); } catch {}
  try { micStream && micStream.getTracks().forEach(t => t.stop()); } catch {}
  setMicUI(); finalize();
}
const WAKE_RE = /\b(?:hey|ok|okay|hi|yo)?\s*(?:bhat\s?bot|jarvis|j\.?a\.?r\.?v\.?i\.?s)\b[\s,.:;!?-]*(.*)$/i;
async function finalize() {
  const flat = flatten(recChunks); recChunks = [];
  if (!heardSpeech || flat.length < capRate * 0.25) { if (convoActive || wakeMode) return startListening(); bar.textContent = ''; return; }
  bar.textContent = '⏳ transcribing…';
  const wav = encodeWAV(downsample(flat, capRate, 16000), 16000);
  try {
    const r = await fetch(API + '/stt?mime=audio/wav', { method:'POST', headers:{'content-type':'audio/wav'}, body: wav }).then(x => x.json());
    bar.textContent = '';
    const said = (r.text || '').trim();
    if (r.error) add('err', 'STT: ' + r.error);
    else if (said) {
      // Wake mode (and not in a full mic conversation): only act if the wake word was said.
      if (wakeMode && !convoActive) {
        const m = said.match(WAKE_RE);
        if (m) {
          const cmd = (m[1] || '').trim();
          bar.textContent = '👂 ' + said;
          if (cmd) { ta.value = cmd; autoresize(); await send(cmd); }
          else { await speak('Yes, sir?'); }     // wake word alone → acknowledge, await command
        } else { bar.textContent = '👂 waiting for "hey BhatBot"…'; }   // ignore non-wake speech
      } else { ta.value = said; autoresize(); await send(said); }
    }
  } catch (e) { bar.textContent = ''; add('err', 'STT: ' + (e.message || e)); }
  if (convoActive || wakeMode) startListening();                  // keep listening
}

// ---- WAV helpers ----
function flatten(chunks) { let n = 0; for (const c of chunks) n += c.length; const out = new Float32Array(n); let o = 0; for (const c of chunks) { out.set(c, o); o += c.length; } return out; }
function downsample(buf, inRate, outRate) {
  if (outRate >= inRate) return buf;
  const ratio = inRate / outRate, n = Math.round(buf.length / ratio), out = new Float32Array(n);
  let oi = 0, ii = 0; while (oi < n) { const next = Math.round((oi + 1) * ratio); let s = 0, c = 0; for (; ii < next && ii < buf.length; ii++) { s += buf[ii]; c++; } out[oi++] = c ? s / c : 0; }
  return out;
}
function encodeWAV(samples, rate) {
  const buf = new ArrayBuffer(44 + samples.length * 2), v = new DataView(buf);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true); v.setUint32(24,rate,true);
  v.setUint32(28,rate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true); ws(36,'data'); v.setUint32(40, samples.length*2, true);
  let o = 44; for (let i = 0; i < samples.length; i++) { let x = Math.max(-1, Math.min(1, samples[i])); v.setInt16(o, x < 0 ? x * 0x8000 : x * 0x7fff, true); o += 2; }
  return buf;
}

// ---- Tabs: Chat / Activity / Control / Nexus ----
let curTab = 'chat', nexusLoaded = false;
const tabs = [...document.querySelectorAll('#tabs .tab')];
const views = { chat: document.getElementById('view-chat'), activity: document.getElementById('view-activity'), control: document.getElementById('view-control'), nexus: document.getElementById('view-nexus') };
function showTab(name) {
  curTab = name;
  tabs.forEach(t => t.classList.toggle('on', t.dataset.tab === name));
  for (const k in views) views[k].classList.toggle('on', k === name);
  if (name === 'activity') { actSeen = actLastId; updateActBadge(); }
  if (name === 'nexus' && !nexusLoaded) loadNexus();
  if (name === 'control') { refreshScreen(); refreshJobs(); if (!ctlTimer) ctlTimer = setInterval(refreshJobs, 4000); }
  else if (ctlTimer) { clearInterval(ctlTimer); ctlTimer = null; }
}
tabs.forEach(t => t.addEventListener('click', () => { ensureCtx(); showTab(t.dataset.tab); }));

// ---- Control tab: live desktop screen + background jobs + quick actions + shell ----
let ctlTimer = null;
async function ctl(tool, input) {
  try {
    return await fetch(API + '/control', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tool, input }) }).then(r => r.json());
  } catch (e) { return { error: e.message }; }
}
const screenimg = document.getElementById('screenimg');
async function refreshScreen() {
  screenimg.style.opacity = .35;
  try {
    const r = await fetch(API + '/screen', { cache: 'no-store' }).then(x => x.json());
    if (r.image) screenimg.src = 'data:' + (r.mime || 'image/jpeg') + ';base64,' + r.image;
  } catch {}
  screenimg.style.opacity = 1;
}
document.getElementById('screenwrap').addEventListener('click', refreshScreen);
document.getElementById('screenrefresh').addEventListener('click', refreshScreen);

const jobsbox = document.getElementById('jobsbox');
async function refreshJobs() {
  try {
    const { jobs } = await fetch(API + '/jobs', { cache: 'no-store' }).then(r => r.json());
    if (!jobs || !jobs.length) return;
    jobsbox.innerHTML = '';
    for (const j of jobs.slice().reverse()) {
      const c = document.createElement('div');
      c.className = 'jcard'; c.dataset.status = j.status;
      c.innerHTML = '<div class="jtop"><span class="jn"></span><span class="js"></span></div><div class="jprog"><i></i></div><div class="jnote"></div><div class="jbtns"></div>';
      c.querySelector('.jn').textContent = (j.kind === 'project' ? '◈ ' : '') + (j.agent ? '[' + j.agent + '] ' : '') + j.name;
      c.querySelector('.js').textContent = j.status;
      c.querySelector('.jprog i').style.width = Math.round((j.progress || 0) * 100) + '%';
      c.querySelector('.jnote').textContent = j.note || '';
      const btns = c.querySelector('.jbtns');
      if (['queued', 'running', 'blocked'].includes(j.status)) {
        const cancel = document.createElement('button'); cancel.textContent = '✕ cancel';
        cancel.addEventListener('click', async () => { await fetch(API + '/jobs/' + j.id + '/cancel', { method: 'POST' }); refreshJobs(); });
        const steer = document.createElement('button'); steer.textContent = '✎ steer';
        steer.addEventListener('click', async () => {
          const text = prompt('Steering note for this job (plain English):');
          if (text) await fetch(API + '/jobs/' + j.id + '/guide', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
        });
        btns.appendChild(cancel); btns.appendChild(steer);
      } else btns.remove();
      jobsbox.appendChild(c);
    }
  } catch {}
}

const QUICK = {
  playpause: ['system_control', { action: 'applescript', script: 'tell application "Spotify" to playpause' }],
  next: ['media_control', { action: 'next' }],
  voldown: ['system_control', { action: 'applescript', script: 'set volume output volume (output volume of (get volume settings) - 10)' }],
  volup: ['system_control', { action: 'applescript', script: 'set volume output volume (output volume of (get volume settings) + 10)' }],
  mute: ['system_control', { action: 'applescript', script: 'set volume with output muted' }],
  nowplaying: ['media_control', { action: 'get_now_playing' }],
  sleepdisplay: ['system_control', { action: 'applescript', script: 'do shell script "pmset displaysleepnow"' }],
  lock: ['system_control', { action: 'applescript', script: 'tell application "System Events" to keystroke "q" using {control down, command down}' }],
};
document.querySelectorAll('.qbtn').forEach(b => b.addEventListener('click', async () => {
  const [tool, input] = QUICK[b.dataset.q] || [];
  if (!tool) return;
  b.style.opacity = .5;
  const r = await ctl(tool, input);
  b.style.opacity = 1;
  if (b.dataset.q === 'nowplaying' && r && (r.track || r.result || r.output)) alert(JSON.stringify(r.track || r.result || r.output));
  else if (r && r.error) alert('⚠ ' + r.error);
}));

const shellout = document.getElementById('shellout');
document.getElementById('shellrun').addEventListener('click', async () => {
  const cmd = document.getElementById('shellcmd').value.trim();
  if (!cmd) return;
  shellout.style.display = 'block'; shellout.textContent = '⟳ running…';
  const r = await ctl('run_shell', { command: cmd });
  shellout.textContent = r.error ? ('⚠ ' + r.error) : ((r.stdout || '') + (r.stderr ? '\n[stderr] ' + r.stderr : '') || '(no output)');
});

async function loadNexus() {
  nexusLoaded = true;
  const v = views.nexus;
  v.innerHTML = '<div style="margin:auto;color:var(--dim);font-size:13px">loading Nexus…</div>';
  try {
    const cfg = await fetch(API + '/config').then(r => r.json());
    const url = cfg.nexusUrl || 'https://nexusresearch.xyz';
    v.innerHTML = '';
    const f = document.createElement('iframe'); f.src = url; f.allow = 'fullscreen';
    f.onerror = () => { v.innerHTML = '<div style="margin:auto;color:var(--dim);padding:24px;text-align:center">Nexus could not be embedded.<br><a style="color:var(--cyan)" href="' + url + '" target="_blank">Open in browser ↗</a></div>'; };
    v.appendChild(f);
  } catch { v.innerHTML = '<div style="margin:auto;color:var(--dim)">Nexus unavailable</div>'; }
}

// ---- Activity feed: poll the Mac's live tool/thinking stream ----
const actfeed = document.getElementById('actfeed'), actbadge = document.getElementById('actbadge');
let actLastId = 0, actSeen = 0;
function updateActBadge() {
  const n = actLastId - actSeen;
  if (n > 0 && curTab !== 'activity') { actbadge.style.display = 'inline-block'; actbadge.textContent = n > 99 ? '99+' : String(n); }
  else { actbadge.style.display = 'none'; }
}
function renderAct(events) {
  if (!events.length) return;
  if (actfeed.querySelector('.empty')) actfeed.innerHTML = '';
  for (const e of events) {
    const row = document.createElement('div'); row.className = 'act';
    const time = new Date(e.t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    row.innerHTML = '<span class="k">' + time + ' · ' + (e.kind || '') + '</span><span class="v"></span>';
    row.querySelector('.v').textContent = e.text;
    actfeed.appendChild(row);
    actLastId = Math.max(actLastId, e.id);
  }
  while (actfeed.children.length > 200) actfeed.removeChild(actfeed.firstChild);
  if (curTab === 'activity') { actfeed.scrollTop = actfeed.scrollHeight; actSeen = actLastId; }
  updateActBadge();
}
async function pollActivity() {
  try {
    const r = await fetch(API + '/activity?since=' + actLastId, { cache: 'no-store' }).then(x => x.json());
    if (r && r.events) renderAct(r.events);
  } catch {}
}
setInterval(pollActivity, 3000); pollActivity();

add('bot', 'Bhatbot online. Type, or tap 🎙 for hands-free conversation. Tap 👂 and just say "hey BhatBot" to wake me. Activity + Nexus are in the tabs below.');
