<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bhatbot">
<meta name="theme-color" content="#090d13">
<title>Bhatbot</title>
<link rel="manifest" id="manifest">
<link rel="apple-touch-icon" id="touchicon">
<style>
  :root { --bg:#090d13; --panel:#0e141d; --line:#1b2735; --cyan:#39d7ff; --txt:#dce6f0; --dim:#6f8198; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; overscroll-behavior:none; }
  body { display:flex; flex-direction:column; }
  header { display:flex; align-items:center; gap:10px; padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
    border-bottom:1px solid var(--line); background:linear-gradient(180deg,#0c1219,#090d13); }
  header .dot { width:9px; height:9px; border-radius:50%; background:var(--cyan); box-shadow:0 0 10px var(--cyan); }
  header .dot.off { background:#7a4; box-shadow:none; }
  header b { font-weight:600; letter-spacing:.5px; }
  header small { color:var(--dim); margin-left:auto; font-size:12px; }
  #log { flex:1; overflow-y:auto; padding:16px 12px 8px; -webkit-overflow-scrolling:touch; }
  .msg { max-width:86%; margin:8px 0; padding:10px 13px; border-radius:16px; white-space:pre-wrap; word-wrap:break-word; }
  .me { margin-left:auto; background:#13283a; border:1px solid #1d3a52; border-bottom-right-radius:4px; }
  .bot { margin-right:auto; background:var(--panel); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .err { margin-right:auto; background:#2a1416; border:1px solid #4a2126; color:#ff9aa2; }
  .thinking { color:var(--dim); font-style:italic; }
  footer { padding:8px 10px calc(env(safe-area-inset-bottom) + 8px); border-top:1px solid var(--line); background:#0c1219; }
  #bar { color:var(--dim); font-size:12px; min-height:16px; padding:0 6px 4px; }
  #attbar { display:flex; flex-wrap:wrap; gap:6px; padding:0 4px 6px; }
  #attbar:empty { display:none; }
  .attchip { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--cyan);
    border:1px solid #1b4a5e; border-radius:12px; padding:3px 10px; background:rgba(57,215,255,.07); }
  .attchip .x { color:var(--dim); }
  .row { display:flex; align-items:flex-end; gap:8px; }
  textarea { flex:1; resize:none; max-height:120px; background:var(--panel); color:var(--txt);
    border:1px solid var(--line); border-radius:20px; padding:10px 14px; font:inherit; outline:none; }
  textarea:focus { border-color:var(--cyan); }
  button { flex:0 0 auto; width:44px; height:44px; border-radius:50%; border:1px solid var(--line);
    background:var(--panel); color:var(--txt); font-size:19px; display:grid; place-items:center; }
  button:active { transform:scale(.92); }
  #mic.rec { background:var(--cyan); color:#04222e; border-color:var(--cyan); animation:pulse 1.2s infinite; }
  #mic.hot { background:#1b3a4a; border-color:var(--cyan); color:var(--cyan); }
  #spk.off { opacity:.4; }
  #send { background:var(--cyan); color:#04222e; border-color:var(--cyan); font-size:17px; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(57,215,255,.5);} 50%{ box-shadow:0 0 0 12px rgba(57,215,255,0);} }
</style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span><b>BHATBOT</b>
  <small id="net">connecting…</small>
</header>
<div id="log"></div>
<footer>
  <div id="bar"></div>
  <div id="attbar"></div>
  <div class="row">
    <button id="spk" title="Voice replies">🔊</button>
    <button id="mic" title="Hands-free conversation">🎙</button>
    <button id="attach" title="Attach photo / screenshot / screen recording">📎</button>
    <textarea id="ta" rows="1" placeholder="Message Bhatbot…" enterkeyhint="send"></textarea>
    <button id="send" title="Send">➤</button>
  </div>
  <input type="file" id="file" accept="image/*,video/*" multiple style="display:none">
</footer>
<script>
// ---- token + endpoints (page is served at /app/<token>) ----
const TOKEN = location.pathname.split('/')[2] || '';
const API = '/api/' + TOKEN;
const BUILD = '__BUILD__';                       // injected at serve time; drives auto-reload
document.getElementById('manifest').href = '/app/' + TOKEN + '/manifest.webmanifest';
document.getElementById('touchicon').href = '/app/' + TOKEN + '/icon-192.png';

// Auto-update: kill any old caching service worker, then poll the build id and
// reload the home-screen app whenever a new version is deployed (no reinstall).
if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister())).catch(()=>{});
let _updating = false;
async function checkUpdate() {
  try {
    const v = await fetch('/app/' + TOKEN + '/version', { cache: 'no-store' }).then(r => r.json()).then(j => j.version);
    if (v && v !== BUILD && !_updating) { _updating = true; location.reload(); }
  } catch {}
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) checkUpdate(); });
setInterval(checkUpdate, 60000);
setTimeout(checkUpdate, 3000);

const log = document.getElementById('log'), ta = document.getElementById('ta'), bar = document.getElementById('bar');
const mic = document.getElementById('mic'), spk = document.getElementById('spk'), sendBtn = document.getElementById('send');
const dot = document.getElementById('dot'), net = document.getElementById('net');
let ttsOn = true, busy = false;

function add(cls, text) { const d = document.createElement('div'); d.className = 'msg ' + cls; d.textContent = text; log.appendChild(d); log.scrollTop = log.scrollHeight; return d; }
function autoresize() { ta.style.height = 'auto'; ta.style.height = Math.min(120, ta.scrollHeight) + 'px'; }
ta.addEventListener('input', autoresize);
ta.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ensureCtx(); send(); } });
sendBtn.addEventListener('click', () => { ensureCtx(); send(); });

fetch('/health').then(r => r.json()).then(() => { net.textContent = 'online'; dot.classList.remove('off'); })
  .catch(() => { net.textContent = 'Mac offline'; dot.classList.add('off'); });

// ---- ONE AudioContext, unlocked on first gesture — fixes iOS mic + TTS playback ----
let actx = null;
function ensureCtx() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch {} }
  if (actx && actx.state === 'suspended') actx.resume().catch(()=>{});
  return actx;
}
document.body.addEventListener('touchstart', ensureCtx, { passive: true });
document.body.addEventListener('click', ensureCtx);

// ---- chat ----
// ---- attachments: upload to /attach → vision blocks for the next message ----
let pendingBlocks = [];
function renderAtt() {
  const bar = document.getElementById('attbar'); bar.innerHTML = '';
  if (!pendingBlocks.length) return;
  const imgs = pendingBlocks.filter(b => b.type === 'image').length;
  const c = document.createElement('span'); c.className = 'attchip';
  c.innerHTML = '📎 ' + imgs + ' image' + (imgs !== 1 ? 's' : '') + ' <span class="x">✕</span>';
  c.querySelector('.x').addEventListener('click', () => { pendingBlocks = []; renderAtt(); });
  bar.appendChild(c);
}
document.getElementById('attach').addEventListener('click', () => { ensureCtx(); document.getElementById('file').click(); });
document.getElementById('file').addEventListener('change', async (e) => {
  const files = [...e.target.files]; e.target.value = '';
  if (!files.length) return;
  bar.textContent = '⏳ uploading ' + files.length + ' file' + (files.length > 1 ? 's' : '') + '…';
  for (const f of files) {
    try {
      const buf = await f.arrayBuffer();
      const r = await fetch(API + '/attach?mime=' + encodeURIComponent(f.type || 'application/octet-stream'),
        { method: 'POST', headers: { 'content-type': f.type || 'application/octet-stream' }, body: buf }).then(x => x.json());
      if (r.blocks) pendingBlocks.push(...r.blocks);
      else if (r.error) add('err', 'Attach: ' + r.error);
    } catch (err) { add('err', 'Attach: ' + (err.message || err)); }
  }
  bar.textContent = ''; renderAtt();
});

let lastFullReply = '';
async function send(forced) {
  const text = (forced != null ? forced : ta.value).trim();
  if (!text && !pendingBlocks.length) return false; if (busy) return false;
  // "read the whole/entire/full response" → re-read the last reply in full, don't query the agent
  if (/^\s*(read|play|speak)( me| it| out| aloud)*( the)?( whole| entire| full| complete)( response| reply| answer| thing| text)?\.?\s*$/i.test(text)) {
    ta.value = ''; autoresize();
    if (lastFullReply) await speak(lastFullReply, { full: true }); else bar.textContent = 'nothing to read yet';
    return true;
  }
  busy = true; ta.value = ''; autoresize();
  const blocks = pendingBlocks; pendingBlocks = []; renderAtt();
  const nImg = blocks.filter(b => b.type === 'image').length;
  add('me', text + (nImg ? `  📎 ${nImg} image${nImg > 1 ? 's' : ''}` : ''));
  const t = add('bot thinking', '…');
  try {
    const r = await fetch(API + '/chat', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ text, blocks }) }).then(x => x.json());
    if (r.error) { t.remove(); add('err', r.error); }
    else {
      t.className = 'msg bot'; t.textContent = r.text || '(no output)';
      if ((r.text || '').length > 250) addReadFull(t, r.text);
      await speak(r.text || '');
    }
  } catch (e) { t.remove(); add('err', String(e.message || e)); }
  log.scrollTop = log.scrollHeight; busy = false; return true;
}
function addReadFull(bubble, fullText) {
  const b = document.createElement('div');
  b.textContent = '🔊 read full reply';
  b.style.cssText = 'display:inline-block;margin-top:7px;font-size:13px;color:var(--cyan);border:1px solid #1b4a5e;border-radius:6px;padding:3px 9px;';
  b.addEventListener('click', () => speak(fullText, { full: true }));
  bubble.appendChild(document.createElement('br')); bubble.appendChild(b);
}

// ---- TTS: Jarvis voice, sentence-streamed, played via Web Audio (iOS-safe) ----
let ttsSeq = 0, curSrc = null;
function splitSentences(text) {
  const clean = String(text || '').replace(/```[\s\S]*?```/g, ' (code block) ').replace(/[*_`#>]/g, '').trim();
  const parts = clean.match(/[^.!?\n]+[.!?]?(\s|$)|[^.!?\n]+$/g) || [];
  const out = []; let buf = '';
  for (let p of parts) { p = p.trim(); if (!p) continue; buf = buf ? buf + ' ' + p : p; if (buf.length >= 60 || /[.!?]$/.test(p)) { out.push(buf); buf = ''; } }
  if (buf) out.push(buf);
  return out.filter(s => s.length);
}
function b64ToBuf(b64) { const bin = atob(b64), len = bin.length, u = new Uint8Array(len); for (let i=0;i<len;i++) u[i] = bin.charCodeAt(i); return u.buffer; }
function stopSpeaking() { ttsSeq++; if (curSrc) { try { curSrc.stop(); } catch {} curSrc = null; } }
async function ttsOne(s) {
  try { const r = await fetch(API + '/tts', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ text: s }) }).then(x => x.json()); return (r && r.audio) ? b64ToBuf(r.audio) : null; }
  catch { return null; }
}
function playBuf(arrBuf, seq) {
  return new Promise((res) => {
    const ctx = ensureCtx();
    if (!ctx || seq !== ttsSeq) return res();
    ctx.decodeAudioData(arrBuf.slice(0), (audio) => {
      if (seq !== ttsSeq) return res();
      const s = ctx.createBufferSource(); s.buffer = audio; s.connect(ctx.destination); curSrc = s;
      s.onended = () => res(); s.start();
    }, () => res());
  });
}
async function speak(text, opts = {}) {
  if (!ttsOn) return;
  lastFullReply = String(text || '');
  let spoken = lastFullReply;
  if (!opts.full && spoken.length > 250) {
    try { const r = await fetch(API + '/summarize', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ text: spoken }) }).then(x => x.json()); if (r && r.text) spoken = r.text; } catch {}
  }
  stopSpeaking(); const seq = ++ttsSeq;
  const sents = splitSentences(spoken); if (!sents.length) return;
  const jobs = sents.map(ttsOne);
  for (let i = 0; i < jobs.length; i++) { const b = await jobs[i]; if (seq !== ttsSeq) return; if (b) await playBuf(b, seq); if (seq !== ttsSeq) return; }
}
spk.addEventListener('click', () => { ttsOn = !ttsOn; spk.classList.toggle('off', !ttsOn); spk.textContent = ttsOn ? '🔊' : '🔇'; if (!ttsOn) stopSpeaking(); });

// ---- STT: hands-free conversation loop. WAV capture via Web Audio (iOS-safe). ----
// Mic tap starts a CONVERSATION: it listens, sends, speaks the reply, then listens
// again — and keeps waiting until YOU actually speak (never times out on silence
// before you've said anything). Tap again to end the conversation.
let convoActive = false, listening = false, micStream = null, proc = null, srcNode = null, muteNode = null;
let recChunks = [], heardSpeech = false, silenceAt = 0, capRate = 16000;
const SILENCE_MS = 1600, SPEECH_RMS = 0.03;

function setMicUI() {
  mic.classList.toggle('rec', listening);
  mic.classList.toggle('hot', convoActive && !listening);
  mic.textContent = (convoActive || listening) ? '⏹' : '🎙';
}
mic.addEventListener('click', () => {
  ensureCtx();
  if (convoActive || listening) { convoActive = false; stopSpeaking(); stopListening(); bar.textContent = ''; setMicUI(); }
  else { convoActive = true; stopSpeaking(); setMicUI(); startListening(); }
});

async function startListening() {
  if (listening) return;
  const ctx = ensureCtx(); if (!ctx) { add('err', 'No audio support'); convoActive = false; setMicUI(); return; }
  try { micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } }); }
  catch (e) { add('err', 'Mic blocked: ' + e.message); convoActive = false; setMicUI(); return; }
  listening = true; heardSpeech = false; recChunks = []; capRate = ctx.sampleRate; silenceAt = Date.now();
  setMicUI(); bar.textContent = '🎙 listening…';
  srcNode = ctx.createMediaStreamSource(micStream);
  proc = ctx.createScriptProcessor(4096, 1, 1);
  muteNode = ctx.createGain(); muteNode.gain.value = 0;          // keep the graph running silently
  srcNode.connect(proc); proc.connect(muteNode); muteNode.connect(ctx.destination);
  proc.onaudioprocess = (e) => {
    if (!listening) return;
    const ch = e.inputBuffer.getChannelData(0);
    recChunks.push(new Float32Array(ch));
    let s = 0; for (let i = 0; i < ch.length; i++) s += ch[i] * ch[i];
    const rms = Math.sqrt(s / ch.length); const now = Date.now();
    if (rms > SPEECH_RMS) { heardSpeech = true; silenceAt = now; bar.textContent = '🎙 listening…'; }
    else if (heardSpeech && now - silenceAt > SILENCE_MS) { stopListening(); }   // only stops AFTER you've spoken
  };
}
function stopListening() {
  if (!listening) return; listening = false;
  try { proc && (proc.onaudioprocess = null); proc && proc.disconnect(); srcNode && srcNode.disconnect(); muteNode && muteNode.disconnect(); } catch {}
  try { micStream && micStream.getTracks().forEach(t => t.stop()); } catch {}
  setMicUI(); finalize();
}
async function finalize() {
  const flat = flatten(recChunks); recChunks = [];
  if (!heardSpeech || flat.length < capRate * 0.25) { if (convoActive) return startListening(); bar.textContent = ''; return; }
  bar.textContent = '⏳ transcribing…';
  const wav = encodeWAV(downsample(flat, capRate, 16000), 16000);
  try {
    const r = await fetch(API + '/stt?mime=audio/wav', { method:'POST', headers:{'content-type':'audio/wav'}, body: wav }).then(x => x.json());
    bar.textContent = '';
    if (r.text) { ta.value = r.text; autoresize(); await send(r.text); }
    else if (r.error) add('err', 'STT: ' + r.error);
  } catch (e) { bar.textContent = ''; add('err', 'STT: ' + (e.message || e)); }
  if (convoActive) startListening();                              // keep the conversation going
}

// ---- WAV helpers ----
function flatten(chunks) { let n = 0; for (const c of chunks) n += c.length; const out = new Float32Array(n); let o = 0; for (const c of chunks) { out.set(c, o); o += c.length; } return out; }
function downsample(buf, inRate, outRate) {
  if (outRate >= inRate) return buf;
  const ratio = inRate / outRate, n = Math.round(buf.length / ratio), out = new Float32Array(n);
  let oi = 0, ii = 0; while (oi < n) { const next = Math.round((oi + 1) * ratio); let s = 0, c = 0; for (; ii < next && ii < buf.length; ii++) { s += buf[ii]; c++; } out[oi++] = c ? s / c : 0; }
  return out;
}
function encodeWAV(samples, rate) {
  const buf = new ArrayBuffer(44 + samples.length * 2), v = new DataView(buf);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true); v.setUint32(24,rate,true);
  v.setUint32(28,rate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true); ws(36,'data'); v.setUint32(40, samples.length*2, true);
  let o = 44; for (let i = 0; i < samples.length; i++) { let x = Math.max(-1, Math.min(1, samples[i])); v.setInt16(o, x < 0 ? x * 0x8000 : x * 0x7fff, true); o += 2; }
  return buf;
}

add('bot', 'Bhatbot online. Type, or tap 🎙 for hands-free conversation — I keep listening between turns until you tap ⏹.');
</script>
</body>
</html>
