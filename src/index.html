<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self' file:; style-src 'self' 'unsafe-inline' file: https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' file:; img-src 'self' file: data: blob:; connect-src 'self';" />
<title>Bhatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
<style>
  :root {
    --bg: #090d13;
    --surface: #0d1520;
    --surface-2: #111c2b;
    --accent: #00c8ff;
    --accent-dim: #0a4a63;
    --text: #c8d6e5;
    --text-dim: #5b708a;
    --text-dim2: #46627d;
    --ok: #2fe08a;
    --warn: #ffb02e;
    --err: #ff4d5e;
    --line: #15212f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    overflow: hidden;
    user-select: none;
  }
  /* scanlines */
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9000;
    background: repeating-linear-gradient(0deg, rgba(0,200,255,0.022) 0 1px, transparent 1px 3px);
    mix-blend-mode: screen;
  }
  /* corner brackets */
  .corner { position: fixed; width: 14px; height: 14px; z-index: 8000; pointer-events: none; border-color: var(--accent-dim); }
  .corner.tl { top: 6px; left: 6px; border-top: 1px solid; border-left: 1px solid; }
  .corner.tr { top: 6px; right: 6px; border-top: 1px solid; border-right: 1px solid; }
  .corner.bl { bottom: 6px; left: 6px; border-bottom: 1px solid; border-left: 1px solid; }
  .corner.br { bottom: 6px; right: 6px; border-bottom: 1px solid; border-right: 1px solid; }

  #app { display: flex; flex-direction: column; height: 100%; }

  /* ---------------- titlebar ---------------- */
  #titlebar {
    -webkit-app-region: drag;
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #0c131d, #0a0f17);
  }
  .tb-left { display: flex; align-items: center; gap: 9px; }
  .hud-ring { width: 18px; height: 18px; animation: spin 7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .brand { font-weight: 700; letter-spacing: 3px; font-size: 12px; color: var(--text); position: relative; }
  .brand.glitch::before, .brand.glitch::after {
    content: 'BHATBOT'; position: absolute; top: 0; left: 0; width: 100%; overflow: hidden;
  }
  .brand.glitch::before { color: var(--err); transform: translate(-1.5px, 0); clip-path: inset(0 0 55% 0); }
  .brand.glitch::after { color: var(--accent); transform: translate(1.5px, 0); clip-path: inset(55% 0 0 0); }
  .brand.glitch { animation: skew 0.25s steps(2) 1; }
  @keyframes skew { 0%,100% { transform: skewX(0); } 40% { transform: skewX(-6deg); } 70% { transform: skewX(4deg); } }

  .tb-btns { -webkit-app-region: no-drag; display: flex; gap: 6px; }
  .tb-btn {
    width: 22px; height: 22px; border: 1px solid var(--line); background: var(--surface);
    color: var(--text-dim); cursor: pointer; font-size: 13px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center; transition: .12s;
  }
  .tb-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

  /* ---------------- context bar ---------------- */
  #ctxbar {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 7px 12px; border-bottom: 1px solid var(--line); background: var(--surface);
  }
  .tag {
    -webkit-app-region: no-drag;
    font-size: 12px; padding: 4px 8px; border: 1px solid var(--line); border-radius: 3px;
    color: var(--text-dim); cursor: pointer; transition: .12s; white-space: nowrap;
  }
  .tag:hover { border-color: var(--accent-dim); color: var(--accent); }
  .tag.ctx { border-color: var(--accent-dim); color: var(--accent); cursor: default; }
  .tag.active { border-color: var(--accent); color: var(--accent); background: rgba(0,200,255,0.10); }

  /* ---------------- swappable stage panels (Nexus / Studio / Activity / Notes) ---------------- */
  .stage-panel { display: none; flex: 1; min-height: 0; flex-direction: column; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 9px 16px; border-bottom: 1px solid var(--line); background: var(--surface); }
  .panel-head b { color: var(--accent); letter-spacing: .08em; font-size: 13px; }
  .panel-back { cursor: pointer; color: var(--text-dim); font-size: 12px; padding: 2px 9px; border: 1px solid var(--line); border-radius: 5px; }
  .panel-back:hover { border-color: var(--accent); color: var(--accent); }
  webview.panelview { flex: 1; width: 100%; border: 0; background: #0b1119; }
  #activity-list { overflow: auto; padding: 10px 14px; flex: 1; font-size: 12.5px; }
  #activity-list:empty::before { content: 'No activity yet — tool calls and agent events stream here during a task.'; color: var(--text-dim2); }
  .act-row { padding: 3px 0 3px 8px; color: var(--text-dim); border-left: 2px solid var(--accent-dim); margin-bottom: 4px; word-break: break-word; animation: slidein .18s ease; }
  .act-row.ok { border-color: var(--ok); } .act-row.fail { border-color: var(--err); color: #e89; }
  .act-row .t { color: var(--text-dim2); font-size: 11px; margin-right: 6px; }

  /* background job cards — one per delegated agent task, live via job-update IPC */
  #jobs-board { padding: 10px 14px 0; display: flex; flex-direction: column; gap: 8px; }
  #jobs-board:empty { display: none; }
  .job-card { border: 1px solid var(--line); border-left: 3px solid var(--accent-dim); border-radius: 6px; padding: 8px 10px; background: rgba(0,200,255,0.03); animation: slidein .2s ease; }
  .job-card[data-status="running"] { border-left-color: var(--accent); }
  .job-card[data-status="done"] { border-left-color: var(--ok); opacity: .72; }
  .job-card[data-status="failed"] { border-left-color: var(--err); }
  .job-card[data-status="blocked"] { border-left-color: #e8b339; }
  .job-card[data-status="cancelled"] { opacity: .45; }
  .job-head { display: flex; justify-content: space-between; gap: 8px; font-size: 12.5px; }
  .job-head .jname { color: var(--text); word-break: break-word; }
  .job-head .jstatus { color: var(--text-dim); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; }
  .job-bar { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin: 6px 0 4px; overflow: hidden; }
  .job-bar i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .4s ease; }
  .job-note { font-size: 11.5px; color: var(--text-dim2); word-break: break-word; }

  /* ---------------- chat ---------------- */
  #chat { flex: 1; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 12px; }
  #chat::-webkit-scrollbar { width: 7px; }
  #chat::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 4px; }
  .msg { max-width: 92%; line-height: 1.5; animation: slidein .26s ease; white-space: pre-wrap; word-break: break-word; user-select: text; }
  @keyframes slidein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .msg.user { align-self: flex-end; background: var(--surface-2); border: 1px solid var(--accent-dim); padding: 8px 11px; border-radius: 8px 8px 2px 8px; color: #dff1ff; }
  .msg.bot { align-self: flex-start; color: var(--text); padding: 2px 0; }
  .msg.bot .label { color: var(--accent); font-size: 12px; letter-spacing: 2px; display: block; margin-bottom: 3px; }
  .msg.err { align-self: flex-start; color: var(--err); border-left: 2px solid var(--err); padding-left: 9px; }

  .tool-row {
    align-self: flex-start; font-size: 13px; color: var(--text-dim);
    border-left: 2px solid var(--accent-dim); padding: 4px 9px; background: rgba(0,200,255,0.03);
    animation: slidein .2s ease; user-select: text; max-width: 92%; word-break: break-word;
  }
  .tool-row .ic { display: inline-block; width: 13px; }
  .tool-row.run .ic { animation: spin 1s linear infinite; color: var(--accent); }
  .tool-row.ok .ic { color: var(--ok); }
  .tool-row.fail .ic { color: var(--err); }
  .tool-row .arg { color: var(--text-dim2); }

  /* arc-reactor processing indicator (J.A.R.V.I.S. core) */
  .thinking { align-self: flex-start; padding: 4px 2px; }
  .reactor { position: relative; width: 30px; height: 30px; }
  .reactor i { position: absolute; inset: 0; border-radius: 50%; border: 1px dashed rgba(0,200,255,.5); }
  .reactor i.r1 { animation: spin 2.6s linear infinite; }
  .reactor i.r2 { inset: 5px; border-style: dotted; border-color: rgba(0,200,255,.75); animation: spinrev 1.7s linear infinite; }
  .reactor i.r3 { inset: 10px; border-color: rgba(150,230,255,.9); animation: spin 1s linear infinite; }
  .reactor .core { position: absolute; inset: 12px; border-radius: 50%; background: #bdefff;
    box-shadow: 0 0 10px #00c8ff, 0 0 22px rgba(0,200,255,.55); animation: corepulse 1.4s ease infinite; }
  @keyframes spinrev { to { transform: rotate(-360deg); } }
  @keyframes corepulse { 0%,100% { transform: scale(.85); opacity: .8; } 50% { transform: scale(1.12); opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity: .25; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }

  /* markdown-rendered bot replies */
  .md-body { white-space: normal; }
  .md-body .mdh { color: var(--accent); font-weight: 700; letter-spacing: .06em; margin: 8px 0 3px; font-size: 14px; }
  .md-body .mdli { padding: 1px 0 1px 15px; position: relative; }
  .md-body .mdli::before { content: '▸'; position: absolute; left: 1px; color: var(--accent-dim); }
  .md-body .mdli.num::before { content: ''; }
  .md-body .mdli.num > span { color: var(--accent-dim); }
  .md-body code.ic { background: rgba(0,200,255,.08); border: 1px solid rgba(0,200,255,.16); border-radius: 3px; padding: 0 4px; font-size: .92em; color: #9fe2ff; }
  .md-body pre.codeblk { background: #0a1119; border: 1px solid var(--line); border-left: 2px solid var(--accent-dim);
    border-radius: 6px; padding: 9px 11px; margin: 7px 0; overflow-x: auto; font-size: 13px; line-height: 1.45; color: #a8c5dd; white-space: pre; }
  .md-body .mdgap { height: 7px; }
  .md-body .mdlink { color: var(--accent); text-decoration: underline dotted; }
  .msg.bot.materialize { animation: matz .45s ease; }
  @keyframes matz { 0% { opacity: 0; filter: brightness(2.4) blur(2px); transform: translateY(6px); }
    60% { opacity: 1; filter: brightness(1.35) blur(.4px); } 100% { filter: none; transform: none; } }

  /* holographic cards — generated images + spinning 3D models materialize in chat */
  .holo { align-self: flex-start; width: min(440px, 92%); border: 1px solid rgba(0,200,255,.28); border-radius: 8px;
    background: linear-gradient(180deg, rgba(0,200,255,.05), rgba(0,40,60,.10)); padding: 8px; position: relative;
    overflow: hidden; box-shadow: 0 0 18px rgba(0,200,255,.10), inset 0 0 24px rgba(0,200,255,.04); animation: holoin .5s ease; }
  @keyframes holoin { from { opacity: 0; transform: scale(.96) translateY(8px); filter: brightness(2.2); } to { opacity: 1; } }
  .holo .hbar { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--accent); letter-spacing: .14em; margin-bottom: 6px; }
  .holo .hbar::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(0,200,255,.4), transparent); }
  .holo img { display: block; max-width: 100%; max-height: 340px; border-radius: 4px; cursor: zoom-in; transition: .2s; }
  .holo img.zoom { max-height: none; cursor: zoom-out; }
  .holo .scan { position: absolute; left: 0; right: 0; height: 46px; top: -50px; pointer-events: none;
    background: linear-gradient(180deg, transparent, rgba(0,220,255,.18), transparent); animation: scanpass 1.1s ease .1s 1 forwards; }
  @keyframes scanpass { from { top: -50px; } to { top: 110%; } }
  .holo .h3d { width: 100%; height: 260px; border-radius: 4px; background: radial-gradient(circle at 50% 60%, rgba(0,200,255,.06), transparent 70%); }
  .holo .h3d canvas { display: block; border-radius: 4px; }
  .holo .hfoot { font-size: 10.5px; color: var(--text-dim2); margin-top: 6px; display: flex; align-items: center; gap: 10px; }
  .holo .hbtn { cursor: pointer; color: var(--accent); border: 1px solid var(--accent-dim); border-radius: 4px; padding: 1px 7px; }
  .holo .hbtn:hover { background: rgba(0,200,255,.1); }

  /* ---------------- quick chips ---------------- */
  #chips { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 12px 8px; }
  .chip {
    font-size: 12px; padding: 6px 11px; border: 1px solid var(--line); border-radius: 14px;
    color: var(--text-dim); cursor: pointer; transition: .12s; background: var(--surface);
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  #chips.hidden { display: none; }

  /* ---------------- transcript bar ---------------- */
  #transcript { display: none; padding: 5px 12px; font-size: 11px; color: var(--accent); border-top: 1px solid var(--line); background: rgba(0,200,255,0.04); }
  #transcript.on { display: block; }

  /* ---------------- input ---------------- */
  #inputbar { display: flex; align-items: flex-end; gap: 7px; padding: 9px 12px; border-top: 1px solid var(--line); background: var(--surface); }
  #ta {
    flex: 1; resize: none; max-height: 110px; min-height: 20px; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; font-family: inherit; font-size: 16px;
    outline: none; line-height: 1.4; user-select: text;
  }
  #ta:focus { border-color: var(--accent-dim); }
  .ibtn {
    width: 34px; height: 34px; border: 1px solid var(--line); background: var(--bg); color: var(--text-dim);
    cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: .12s; flex-shrink: 0;
  }
  .ibtn:hover { border-color: var(--accent); color: var(--accent); }
  #send.busy { opacity: .4; pointer-events: none; }
  #mic.rec { border-color: var(--err); }
  .ibtn.rec { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 8px rgba(0,200,255,.4) inset; }
  body.convo #transcript { display: block; border-top-color: var(--accent); }
  body.convo #dot { box-shadow: 0 0 10px var(--accent); }

  /* ===== voice-first stage ===== */
  #vstage { display: none; flex: 1; min-height: 0; flex-direction: column; align-items: center;
    justify-content: center; gap: 22px; padding: 18px 20px; position: relative; }
  #txbtn { display: none; }
  body.voicefirst #txbtn { display: flex; }
  body.voicefirst.show-transcript #txbtn { color: var(--accent); border-color: var(--accent); }
  /* #vstage / #chat visibility is driven by applyStageVisibility() in JS so it cooperates
     with the tab/panel switcher (which sets inline display). */

  /* BhatBot orb: layered reactor — tick ring + concentric rings + dual hex core + equalizer */
  #orb { position: relative; width: 232px; height: 232px; flex-shrink: 0; filter: drop-shadow(0 0 22px rgba(0,200,255,.22)); }
  /* outer tick/graduation ring (radial gradient "notches") */
  #orb .ticks { position: absolute; inset: 0; border-radius: 50%; animation: spin 30s linear infinite;
    background: repeating-conic-gradient(from 0deg, rgba(0,200,255,.34) 0deg 1.4deg, transparent 1.4deg 9deg);
    -webkit-mask: radial-gradient(circle, transparent 0 47%, #000 47% 50%, transparent 50.5%);
            mask: radial-gradient(circle, transparent 0 47%, #000 47% 50%, transparent 50.5%); }
  #orb .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(0,200,255,.22); }
  #orb .ring.r1 { inset: 14px; border-style: dashed; animation: spin 16s linear infinite; }
  #orb .ring.r2 { inset: 38px; border-style: dotted; border-width: 1.5px; border-color: rgba(0,200,255,.4); animation: spinrev 11s linear infinite; }
  #orb .ring.r3 { inset: 64px; border-color: rgba(120,220,255,.55); animation: spin 7s linear infinite; }
  #orb .ring.r4 { inset: 84px; border-top-color: rgba(180,240,255,.9); border-right-color: rgba(180,240,255,.5);
    border-bottom-color: transparent; border-left-color: transparent; border-width: 2px; animation: spin 3.4s linear infinite; }
  #orb .hex { position: absolute; inset: 84px; background:
      conic-gradient(from 0deg, rgba(0,200,255,0), rgba(0,200,255,.5), rgba(0,200,255,0), rgba(0,200,255,.5), rgba(0,200,255,0));
      clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0 50%); animation: spin 6s linear infinite; filter: blur(.3px); }
  #orb .hex.hex2 { inset: 96px; animation: spinrev 4.5s linear infinite; opacity: .7; }
  #orb .glow { position: absolute; inset: 78px; border-radius: 50%; background: radial-gradient(circle, rgba(0,200,255,.28), transparent 70%); animation: corepulse 3.4s ease-in-out infinite; }
  #orb .core { position: absolute; inset: 98px; border-radius: 50%;
      background: radial-gradient(circle at 42% 38%, #ffffff, #6fd6ff 38%, #1f9ed4 66%, transparent 78%);
      box-shadow: 0 0 34px 10px rgba(0,200,255,.6), inset 0 0 14px rgba(255,255,255,.55); animation: corepulse 3s ease-in-out infinite; }
  #orb .eq { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; gap: 5px; }
  #orb .eq i { width: 5px; height: 12px; background: #7fe3ff; border-radius: 3px; box-shadow: 0 0 10px rgba(0,200,255,.8); }
  /* thinking: rings accelerate, core flickers */
  #orb[data-state="thinking"] .ring.r1 { animation-duration: 3.2s; }
  #orb[data-state="thinking"] .ring.r2 { animation-duration: 2.2s; }
  #orb[data-state="thinking"] .ring.r3 { animation-duration: 1.3s; border-color: rgba(150,230,255,.85); }
  #orb[data-state="thinking"] .ring.r4 { animation-duration: 0.9s; }
  #orb[data-state="thinking"] .core { animation: corepulse 1s ease-in-out infinite; }
  #orb[data-state="thinking"] .ticks { animation-duration: 8s; }
  /* speaking: equalizer takes over, core swells */
  #orb[data-state="speaking"] .hex { display: none; }
  #orb[data-state="speaking"] .core { inset: 104px; }
  #orb[data-state="speaking"] .eq { display: flex; }
  #orb[data-state="speaking"] .eq i { animation: veq .7s ease-in-out infinite; }
  #orb[data-state="speaking"] .eq i:nth-child(1){ animation-delay:0s } #orb[data-state="speaking"] .eq i:nth-child(2){ animation-delay:.1s }
  #orb[data-state="speaking"] .eq i:nth-child(3){ animation-delay:.2s } #orb[data-state="speaking"] .eq i:nth-child(4){ animation-delay:.3s }
  #orb[data-state="speaking"] .eq i:nth-child(5){ animation-delay:.4s } #orb[data-state="speaking"] .eq i:nth-child(6){ animation-delay:.5s }
  #orb[data-state="speaking"] .eq i:nth-child(7){ animation-delay:.6s }
  @keyframes veq { 0%,100% { height: 9px; opacity: .6; } 50% { height: 40px; opacity: 1; } }
  #vcap { max-width: 600px; text-align: center; color: var(--text); font-size: 15px; line-height: 1.55; min-height: 1.2em;
    transition: opacity .3s; }
  #vcap:empty { opacity: 0; }
  #vhint { font-size: 11px; color: var(--text-dim2); letter-spacing: .04em; }
  #vvis { width: min(560px, 94%); display: flex; flex-direction: column; gap: 10px; max-height: 40vh; overflow-y: auto; }
  #vvis:empty { display: none; }
  #vvis .holo { width: 100%; }
  /* read-full-reply control under a summarized bot bubble */
  #attachbar { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 4px 6px; }
  #attachbar:empty { display: none; }
  .attchip { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent);
    border: 1px solid var(--accent-dim); border-radius: 12px; padding: 2px 9px; background: rgba(0,200,255,.06); }
  .attchip b { color: var(--text); font-weight: 500; }
  .attchip .x { cursor: pointer; color: var(--text-dim); }
  .attchip .x:hover { color: var(--err); }
  .readfull { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--accent);
    border: 1px solid var(--accent-dim); border-radius: 5px; padding: 2px 8px; cursor: pointer; user-select: none; }
  .readfull:hover { background: var(--accent-dim); }
  /* embedded Claude Code panel (docked in the HUD) */
  #codepanel { position: fixed; left: 0; right: 0; bottom: 0; height: 45vh; background: #0a0f17;
    border-top: 1px solid var(--accent-dim); display: none; flex-direction: column; z-index: 8000;
    box-shadow: 0 -12px 36px rgba(0,0,0,.55); }
  #codepanel.open { display: flex; }
  #codebar { height: 30px; display: flex; align-items: center; gap: 8px; padding: 0 10px; font-size: 11px;
    color: var(--text-dim); border-bottom: 1px solid var(--line); background: var(--surface); }
  #codebar b { color: var(--accent); letter-spacing: 2px; }
  #codebar .sp { flex: 1; }
  #codebar button { background: none; border: 1px solid var(--line); color: var(--text-dim); border-radius: 4px;
    cursor: pointer; font-family: inherit; font-size: 11px; padding: 1px 7px; }
  #codebar button:hover { border-color: var(--accent); color: var(--accent); }
  #codeterm { flex: 1; padding: 6px 8px; overflow: hidden; }
  #codegrip { position: absolute; top: -3px; left: 0; right: 0; height: 7px; cursor: ns-resize; }
  .wave { display: flex; gap: 2px; align-items: center; height: 16px; }
  .wave i { width: 2px; background: var(--err); animation: wv .7s ease infinite; }
  .wave i:nth-child(1){animation-delay:0s} .wave i:nth-child(2){animation-delay:.15s}
  .wave i:nth-child(3){animation-delay:.3s} .wave i:nth-child(4){animation-delay:.45s}
  .wave i:nth-child(5){animation-delay:.2s}
  @keyframes wv { 0%,100% { height: 4px; } 50% { height: 15px; } }

  /* ---------------- status bar ---------------- */
  #statusbar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-top: 1px solid var(--line); font-size: 12px; color: var(--text-dim); }
  #dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); animation: dotpulse 2s infinite; }
  #dot.busy { background: var(--warn); }
  @keyframes dotpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(47,224,138,.5); } 50% { box-shadow: 0 0 0 4px rgba(47,224,138,0); } }
  #count { margin-left: auto; color: var(--text-dim2); }
  /* glance-layer metrics: cost / model / calls / ollama — always visible, no tab switch */
  #metrics { display: flex; align-items: center; gap: 9px; font-size: 11px; color: var(--text-dim2); letter-spacing: .2px; }
  #metrics .m { display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }
  #metrics .m.warn { color: var(--warn); }
  #metrics .m.on { color: var(--ok); }
  #metrics .m.off { color: var(--text-dim2); opacity: .55; }
  /* always-visible status-bar controls (reachable even when the chat bar is hidden) */
  .sbtn { width: 26px; height: 22px; border: 1px solid var(--line); background: var(--bg); color: var(--text-dim);
    cursor: pointer; border-radius: 5px; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: .12s; }
  .sbtn:hover { border-color: var(--accent); color: var(--accent); }
  .sbtn.rec { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 6px rgba(0,200,255,.4) inset; }
  /* ambient mode: pure voice surface — no chat bar, no chips, no attach tray */
  body.ambient #inputbar, body.ambient #attachbar, body.ambient #chips { display: none !important; }

  /* ---------------- boot overlay ---------------- */
  #boot {
    position: fixed; inset: 0; z-index: 10000; background: radial-gradient(circle at 50% 45%, #0c1626 0%, #090d13 70%);
    display: flex; flex-direction: column; justify-content: center; padding: 0 26px;
    transition: opacity .5s ease;
  }
  #hero { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; display: block; }
  #bootinner { position: relative; z-index: 1; pointer-events: none; }
  #bootlog { font-size: 15px; line-height: 1.9; color: var(--accent); white-space: pre; min-height: 220px; text-shadow: 0 0 12px rgba(0,200,255,.45); }
  #bootlog .dim { color: var(--text-dim); }
  #bootbar { margin-top: 14px; height: 3px; background: rgba(21,33,47,.6); border-radius: 2px; overflow: hidden; box-shadow: 0 0 10px rgba(0,200,255,.25); }
  #bootbar i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, #0a4a63, #00c8ff); transition: width .25s linear; box-shadow: 0 0 12px #00c8ff; }
  #boot.gone { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<script>
'use strict';
const $ = (s) => document.querySelector(s);
const chat = $('#chat');
// In voice-first mode, visuals (graphs/images/3D) pop onto the orb stage instead of the
// (hidden) transcript, so you see them without opening another window.
function visTarget() { return (typeof voiceFirst !== 'undefined' && voiceFirst) ? $('#vvis') : chat; }
let history = [];
let busy = false;
let exchanges = 0;

// ===================== hero: particle cloud =====================
// Cyan particle cloud that swirls then coalesces toward a glowing core — the
// loading-screen hero animation. Runs during boot; stops when boot is dismissed.
let heroStop = null;
(function hero() {
  const cv = document.getElementById('hero');
  if (!cv) return;
  const ctx = cv.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W, H, cx, cy;
  function resize() {
    W = cv.width = innerWidth * DPR; H = cv.height = innerHeight * DPR;
    cv.style.width = innerWidth + 'px'; cv.style.height = innerHeight + 'px';
    cx = W / 2; cy = H * 0.45;
  }
  resize();
  addEventListener('resize', resize);

  const N = Math.min(150, Math.floor(innerWidth / 9));
  const P = [];
  for (let i = 0; i < N; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = (Math.min(W, H) * 0.42) * Math.sqrt(Math.random());
    P.push({
      a, r, base: r,
      z: 0.35 + Math.random() * 0.65,           // depth → parallax + size
      sp: (Math.random() * 0.4 + 0.1) * (Math.random() < 0.5 ? -1 : 1) * 0.004,
      tw: Math.random() * Math.PI * 2,           // twinkle phase
      tws: 0.02 + Math.random() * 0.04
    });
  }

  let t = 0, raf;
  function frame() {
    t++;
    ctx.clearRect(0, 0, W, H);
    // pulsing core
    const pulse = 1 + Math.sin(t * 0.05) * 0.18;
    const coreR = 16 * DPR * pulse;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 6);
    g.addColorStop(0, 'rgba(0,200,255,0.55)');
    g.addColorStop(0.4, 'rgba(0,200,255,0.10)');
    g.addColorStop(1, 'rgba(0,200,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, coreR * 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#dff6ff';
    ctx.beginPath(); ctx.arc(cx, cy, coreR * 0.5, 0, Math.PI * 2); ctx.fill();

    // breathing radius — cloud gently contracts/expands toward the core
    const breathe = 1 + Math.sin(t * 0.012) * 0.12;
    const pts = [];
    for (const p of P) {
      p.a += p.sp;
      p.tw += p.tws;
      const r = p.base * breathe * p.z;
      const x = cx + Math.cos(p.a) * r;
      const y = cy + Math.sin(p.a) * r * 0.7;        // flatten → disc/cloud look
      const tw = 0.5 + 0.5 * Math.sin(p.tw);
      const size = (0.8 + p.z * 1.8) * DPR;
      ctx.beginPath();
      ctx.fillStyle = `rgba(${120 + 90 * tw | 0},${210},255,${0.25 + 0.6 * tw * p.z})`;
      ctx.arc(x, y, size, 0, Math.PI * 2); ctx.fill();
      pts.push({ x, y, z: p.z });
    }
    // constellation links between near particles
    ctx.lineWidth = DPR * 0.6;
    const maxD = (90 * DPR) ** 2;
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        const d2 = dx * dx + dy * dy;
        if (d2 < maxD) {
          const o = (1 - d2 / maxD) * 0.18 * pts[i].z * pts[j].z;
          ctx.strokeStyle = `rgba(0,200,255,${o})`;
          ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
        }
      }
    }
    raf = requestAnimationFrame(frame);
  }
  frame();
  heroStop = () => { cancelAnimationFrame(raf); removeEventListener('resize', resize); };
})();

// ===================== boot sequence =====================
(function boot() {
  const today = new Date().toISOString().slice(0, 10);
  const lines = [
    '> BHATBOT AGENT v1.0',
    '> BUILD: ' + today,
    '> CONTEXT: reading CLAUDE.md…',
    '> MEMORY: loading ~/.bhatbot/memory.md…',
    '> TOOLS: fs · shell · browser · claude-code · memory',
    '> MODEL ROUTING: haiku (simple) · sonnet (reasoning)',
    '> PROMPT CACHING: enabled (90% input savings)',
    '> ─────────────────────────────────────────',
    '> SYSTEMS ONLINE.'
  ];
  const log = $('#bootlog');
  const bar = $('#bootbar i');
  let i = 0;
  const tick = () => {
    if (i < lines.length) {
      log.textContent += (i ? '\n' : '') + lines[i];
      bar.style.width = Math.round(((i + 1) / lines.length) * 100) + '%';
      i++;
      setTimeout(tick, 110);
    } else {
      setTimeout(() => {
        $('#boot').classList.add('gone');
        setTimeout(() => { try { heroStop && heroStop(); } catch {} $('#boot').remove(); }, 520);
      }, 260);
    }
  };
  tick();
})();

// ===================== brand glitch =====================
setInterval(() => {
  const b = $('#brand');
  b.classList.add('glitch');
  setTimeout(() => b.classList.remove('glitch'), 260);
}, 9000);

// ===================== context badge =====================
(async () => {
  try {
    const p = await window.bhatbot.getContextPath();
    const tag = $('#ctxtag');
    if (p) {
      const base = p.replace(/\/CLAUDE\.md$/, '').split('/').filter(Boolean).pop() || '/';
      tag.textContent = '⬡ ' + base;
      tag.title = p;
    } else {
      tag.textContent = '⬡ no context';
    }
  } catch { $('#ctxtag').textContent = '⬡ no context'; }
})();

// ===================== rendering =====================
function addUser(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  chat.appendChild(d);
  scroll();
}
// Minimal safe markdown → HTML for bot replies (code blocks, inline code, bold/italic,
// headers, bullets, numbered lists, links). Everything is HTML-escaped first.
function mdRender(md) {
  let s = String(md || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const codeBlocks = [];
  s = s.replace(/```\w*\n?([\s\S]*?)```/g, (_, code) => { codeBlocks.push(code.replace(/\n$/, '')); return '\u0000B' + (codeBlocks.length - 1) + '\u0000'; });
  s = s
    .replace(/`([^`\n]+)`/g, '<code class="ic">$1</code>')
    .replace(/^#{1,4}\s+(.+)$/gm, '<div class="mdh">$1</div>')
    .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
    .replace(/^\s*[-•]\s+(.+)$/gm, '<div class="mdli">$1</div>')
    .replace(/^\s*(\d+)\.\s+(.+)$/gm, '<div class="mdli num"><span>$1.</span> $2</div>')
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<span class="mdlink" title="$2">$1</span>');
  s = s.replace(/\n{2,}/g, '<div class="mdgap"></div>').replace(/\n/g, '<br>')
       .replace(/<\/div><br>/g, '</div>');
  s = s.replace(/\u0000B(\d+)\u0000(<br>)?/g, (_, i) => `<pre class="codeblk">${codeBlocks[+i]}</pre>`);
  return s;
}
function addBot(text) {
  const d = document.createElement('div');
  d.className = 'msg bot materialize';
  const lbl = document.createElement('span');
  lbl.className = 'label'; lbl.textContent = 'BHATBOT';
  const body = document.createElement('span');
  body.className = 'md-body';
  body.innerHTML = mdRender(text || '(no response)');
  d.appendChild(lbl); d.appendChild(body);
  chat.appendChild(d);
  scroll();
  return d;
}
// When a long reply is spoken as a summary, offer a click to hear the whole thing.
function addReadFull(bubble, fullText) {
  if (!bubble || !ttsOn || !voiceCfg.hasTTS) return;
  const b = document.createElement('div');
  b.className = 'readfull'; b.textContent = '🔊 read full reply';
  b.addEventListener('click', () => speak(fullText, { full: true }));
  bubble.appendChild(document.createElement('br'));
  bubble.appendChild(b);
}
function addErr(text) {
  const d = document.createElement('div');
  d.className = 'msg err';
  d.textContent = '⚠ ' + text;
  chat.appendChild(d); scroll();
}
function typeOut(el, text) {
  let i = 0;
  const step = () => {
    el.textContent = text.slice(0, i);
    i++; scroll();
    if (i <= text.length) setTimeout(step, 7);
  };
  step();
}
function addThinking() {
  const d = document.createElement('div');
  d.className = 'thinking'; d.id = 'thinking';
  d.innerHTML = '<div class="reactor"><i class="r1"></i><i class="r2"></i><i class="r3"></i><span class="core"></span></div>';
  chat.appendChild(d); scroll();
}

// ---- holographic in-chat cards (Jarvis HUD): generated images + spinning 3D models ----
function addHoloImage(p, label) {
  const d = document.createElement('div');
  d.className = 'holo';
  d.innerHTML = '<div class="hbar">◈ ' + (label || 'VISUAL') + '</div><div class="scan"></div>';
  const img = document.createElement('img');
  img.src = 'data:' + (p.mime || 'image/jpeg') + ';base64,' + p.image;
  img.addEventListener('click', () => img.classList.toggle('zoom'));
  d.appendChild(img);
  const tgt = visTarget(); tgt.appendChild(d); if (tgt === chat) scroll();
}
async function addHolo3D(modelPath) {
  const d = document.createElement('div');
  d.className = 'holo';
  d.innerHTML = '<div class="hbar">⬡ 3D MODEL · ' + modelPath.split('/').pop().replace(/</g, '&lt;') + '</div><div class="scan"></div>';
  const mount = document.createElement('div'); mount.className = 'h3d';
  d.appendChild(mount);
  const foot = document.createElement('div');
  foot.className = 'hfoot';
  foot.innerHTML = '<span class="hbtn">open in viewer</span><span>drag to orbit · auto-spinning</span>';
  foot.querySelector('.hbtn').addEventListener('click', () => { try { window.bhatbot.open3DViewer(modelPath); } catch {} });
  d.appendChild(foot);
  const tgt = visTarget(); tgt.appendChild(d); if (tgt === chat) scroll();
  try {
    const m = await window.bhatbot.readModel(modelPath);
    if (m && window.holoSpin) window.holoSpin(mount, m);
    else mount.innerHTML = '<div style="color:#46627d;font-size:12px;padding:16px">preview unavailable — use "open in viewer"</div>';
  } catch {
    mount.innerHTML = '<div style="color:#46627d;font-size:12px;padding:16px">preview failed — use "open in viewer"</div>';
  }
}
function rmThinking() { const t = $('#thinking'); if (t) t.remove(); }

const toolRows = {};
function shortArg(name, input) {
  if (!input) return '';
  if (input.path) return input.path;
  if (input.command) return input.command.slice(0, 60);
  if (input.url) return input.url;
  return JSON.stringify(input).slice(0, 60);
}
function toolStart(u) {
  const d = document.createElement('div');
  d.className = 'tool-row run';
  d.innerHTML = '<span class="ic">⟳</span> ' + u.name + ' <span class="arg"></span>';
  d.querySelector('.arg').textContent = shortArg(u.name, u.input);
  chat.appendChild(d); scroll();
  toolRows[u.name + '|' + shortArg(u.name, u.input)] = d;
  return d;
}
function toolDone(u) {
  // find most recent running row for this tool
  const rows = [...document.querySelectorAll('.tool-row.run')];
  const d = rows[rows.length - 1];
  if (!d) return;
  const ok = u.result && u.result.success !== false;
  d.classList.remove('run');
  d.classList.add(ok ? 'ok' : 'fail');
  d.querySelector('.ic').textContent = ok ? '✓' : '✗';
}

function scroll() { chat.scrollTop = chat.scrollHeight; }

// ===================== send =====================
let lastProvider = '';
// ---- glance-layer status metrics: cost today / model / LLM calls / Ollama (no tab switch) ----
let curModel = '', lastHealth = null;
function renderMetrics() {
  const el = $('#metrics'); if (!el) return;
  const h = lastHealth || {};
  const cost = (h.estimatedCost != null ? h.estimatedCost : '$0.000');
  const overBudget = h.dailyBudget != null && parseFloat(String(cost).replace('$', '')) >= h.dailyBudget;
  const calls = h.costCalls != null ? h.costCalls : 0;
  const model = curModel || (h.costByModel && Object.keys(h.costByModel).slice(-1)[0]) || '—';
  const ol = h.ollamaOnline;
  el.innerHTML =
    `<span class="m ${overBudget ? 'warn' : ''}" title="Today's API spend${h.dailyBudget != null ? ' / $' + h.dailyBudget + ' budget' : ''}">💵 ${cost}</span>` +
    `<span class="m" title="Model in use">🧠 ${model}</span>` +
    `<span class="m" title="LLM calls today">📞 ${calls}</span>` +
    `<span class="m ${ol ? 'on' : 'off'}" title="Local Ollama ${ol ? 'online' : 'offline'}">⚡ ${ol ? 'on' : 'off'}</span>`;
}
async function refreshMetrics() {
  try { if (window.bhatbot.getHealth) { lastHealth = await window.bhatbot.getHealth(); renderMetrics(); } } catch {}
}
refreshMetrics(); setInterval(refreshMetrics, 8000);
// Live streaming bubble: tokens append in real time (first word ~0.5s). A new tool call
// "closes" the current bubble so post-tool text starts a fresh one below the tool rows.
let liveBubble = null, streamedThisTurn = false;
function liveAppend(delta) {
  if (!liveBubble) {
    const d = document.createElement('div');
    d.className = 'msg bot';
    const lbl = document.createElement('span'); lbl.className = 'label'; lbl.textContent = 'BHATBOT';
    const body = document.createElement('span'); body.className = 'streambody';
    d.appendChild(lbl); d.appendChild(body);
    chat.appendChild(d);
    liveBubble = d;
  }
  liveBubble.querySelector('.streambody').textContent += delta;
  scroll();
}
function closeLiveBubble() { liveBubble = null; }
window.bhatbot.onToolUpdate((u) => {
  if (u.type === 'token') { rmThinking(); streamedThisTurn = true; if (!voiceFirst) liveAppend(u.text); else { setSpeaking(true); setOrbState('speaking'); } }
  else if (u.type === 'tool_start') { rmThinking(); closeLiveBubble(); toolStart(u); addThinking(); actLog(u.name + ' ' + shortArg(u.name, u.input), 'run'); }
  else if (u.type === 'tool_done') {
    toolDone(u); const ok = u.result && u.result.success !== false;
    actLog((u.name || 'tool') + (ok ? ' ✓' : ' ✗'), ok ? 'ok' : 'fail');
    if (u.preview) addHoloImage(u.preview, u.name === 'generate_image' ? 'GENERATED IMAGE' : u.name === 'studio_write' ? 'STUDIO RENDER' : 'CAPTURE');
    if (u.model3d) addHolo3D(u.model3d);
  }
  else if (u.type === 'thinking' && u.text) { rmThinking(); addThought(u.text); addThinking(); actLog('… ' + u.text.slice(0, 120)); }
  else if (u.type === 'provider_used') {
    lastProvider = u.provider === 'darkbloom'
      ? 'darkbloom · ' + (u.model || '')

async function send(text) {
  text = (text || $('#ta').value).trim();

  if (!text && !atts.length) return; if (busy) return;
  // "read the whole/entire/full response" → speak the last full reply, don't query the agent
  if (/^\s*(read|play|speak)( me| it| out| aloud)*( the)?( whole| entire| full| complete)( response| reply| answer| thing| text)?\.?\s*$/i.test(text)) {
    $('#ta').value = ''; autoresize();
    if (lastFullReply) speak(lastFullReply, { full: true });
    else tbar.textContent = 'nothing to read yet';
    return;
  }
  $('#ta').value = ''; autoresize();
  $('#chips').classList.add('hidden');
  const nImg = atts.filter((b) => b.type === 'image').length;
  addUser(text + (nImg ? `  📎 ${nImg} image${nImg > 1 ? 's' : ''}` : ''));
  history.push({ role: 'user', content: atts.length ? [{ type: 'text', text: text || 'See the attached media.' }, ...atts] : text });
  pendingAtt = []; renderAtt();
  setBusy(true);
  streamedThisTurn = false; liveBubble = null;
  ttsIdle = false;                 // turn in flight; conversation mode re-arms on tts-idle
  setOrbState('thinking');
  addThinking();
  try {
    const res = await window.bhatbot.chat({ history });
    rmThinking();
    if (res.error) { addErr(res.error); closeLiveBubble(); }
    else {
      history = res.history;
      lastFullReply = res.text || lastFullReply;
      if (voiceFirst) {
        // Voice-first: speak first, render nothing live. After the turn we (a) show a SHORTENED
        // caption on the orb stage and (b) write the full reply into the hidden transcript (one
        // render, off the critical path) so it's there if you click 📄. The streamed path is
        // already being spoken by main; the non-streamed fallback is spoken here.
        closeLiveBubble();
        if (res.text) { addBot(res.text); showCaption(res.text); }   // hidden transcript + caption
        if (!(streamedThisTurn && res._streamed) && res.text) {
          setOrbState('speaking');
          speak(res.text).finally(() => { ttsIdle = true; setOrbState('idle'); maybeRearm(); });
        }
      } else if (streamedThisTurn && res._streamed) {
        // Text already rendered live + spoken in main during generation. Finalize: snap the
        // last bubble to the authoritative text, upgraded to rendered markdown.
        if (liveBubble) {
          const body = liveBubble.querySelector('.streambody');
          const finalText = res.text || body.textContent;
          body.classList.add('md-body');
          body.innerHTML = mdRender(finalText);
          if ((res.text || '').length > 300) addReadFull(liveBubble, res.text);
        }
        else if (res.text) { const b = addBot(res.text); if (res.text.length > 300) addReadFull(b, res.text); }
        closeLiveBubble();
      } else {
        // Non-streaming path (fallback providers): render + speak as before.
        const bubble = addBot(res.text);
        speak(res.text).finally(() => { ttsIdle = true; maybeRearm(); });
        if ((res.text || '').length > 300) addReadFull(bubble, res.text);
      }
      exchanges++; $('#count').textContent = exchanges + ' exchanges';
    }
  } catch (e) {
    rmThinking(); closeLiveBubble(); addErr(String(e.message || e));
  } finally {
    setBusy(false);
  }
}

  tbar.classList.toggle('on', on);
}

// ---- Primary STT: MediaRecorder → OpenAI Whisper (reliable, server-side) ----
let mediaRecorder = null, audioChunks = [], micStream = null, audioCtx = null, silenceAt = 0;

async function startVoice() {
  if (recording) return;
  stopSpeaking();                                     // don't talk over the user
  if (!voiceCfg.hasOpenAI) return startWebSpeech();   // fallback if no OpenAI key
  try { micStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch (e) { addErr('Mic permission denied: ' + e.message); return; }
  recording = true; setMicRecording(true);
  tbar.textContent = '🎙 listening… (click mic to send)';
  audioChunks = [];
  mediaRecorder = new MediaRecorder(micStream, { mimeType: 'audio/webm' });
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = onRecStop;
  mediaRecorder.start();
  watchSilence(micStream);
}

// auto-stop 5s after you stop talking (RMS on a WebAudio analyser)
function watchSilence(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(stream);
  const an = audioCtx.createAnalyser(); an.fftSize = 512; src.connect(an);
  const data = new Uint8Array(an.frequencyBinCount);
  silenceAt = Date.now();
  const tick = () => {
    if (!recording) return;
    an.getByteTimeDomainData(data);
    let sum = 0; for (const v of data) { const x = (v - 128) / 128; sum += x * x; }
    const rms = Math.sqrt(sum / data.length);
    if (rms > 0.025) silenceAt = Date.now();
    else if (Date.now() - silenceAt > SILENCE_MS) { endVoice(); return; }
    requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function endVoice() {                 // manual mic click OR 5s silence
  if (!recording) return;
  recording = false;
  try { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); } catch {}
}

async function onRecStop() {
  setMicRecording(false);
  try { micStream && micStream.getTracks().forEach((t) => t.stop()); } catch {}
  try { audioCtx && audioCtx.close(); } catch {}
  if (!audioChunks.length) { tbar.classList.remove('on'); if (convoMode) { ttsIdle = true; maybeRearm(); } return; }
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const buf = await blob.arrayBuffer();
  tbar.classList.add('on'); tbar.textContent = '⏳ transcribing…';
  const res = await window.bhatbot.transcribeAudio({ audioBuffer: Array.from(new Uint8Array(buf)), mimeType: 'audio/webm' });
  tbar.classList.remove('on'); tbar.textContent = '';
  if (res && res.text) submitVoice(res.text);
  else if (res && res.error) addErr('STT: ' + res.error);
}
// Voice input router: while the agent is WORKING, a spoken instruction is injected as live
// guidance into the running task (barge-in steering) instead of starting a new request.
function submitVoice(text) {
  const t = (text || '').trim(); if (!t) return;
  // In conversation mode a stop phrase closes the loop instead of becoming a query.
  if (convoMode && STOP_RE.test(t)) { setConvo(false); tbar.textContent = '🎧 conversation closed'; try { window.bhatbot.sayLocal('Going quiet. Say Jarvis when you need me.'); } catch {} return; }
  if (busy) {
    window.bhatbot.sendGuidance(t);
    addThought('↳ steering (mid-task): ' + t);
  } else { ta.value = t; autoresize(); ttsIdle = false; setTimeout(() => send(t), 150); }
}

// ---- Fallback STT: Web Speech (only if no OpenAI key) ----
let recog = null, finalText = '', manualStop = false, silenceTimer = null, restartTimer = null, starting = false;
function startWebSpeech() {
  if (!SR) { addErr('No STT available — set openaiKey for Whisper.'); return; }
  finalText = ''; manualStop = false; recording = true;
  recog = new SR(); recog.lang = 'en-US'; recog.interimResults = true; recog.continuous = true;
  recog.onstart = () => { starting = false; };
  recog.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) { const t = e.results[i][0].transcript; if (e.results[i].isFinal) finalText += t + ' '; else interim += t; }
    tbar.textContent = '🎙 ' + ((finalText + interim).trim() || 'listening…');
    clearTimeout(silenceTimer); silenceTimer = setTimeout(endWebSpeech, SILENCE_MS);
  };
  recog.onerror = (e) => { tbar.textContent = '🎙 ' + e.error; if (['not-allowed', 'service-not-allowed', 'audio-capture'].includes(e.error)) { manualStop = true; recording = false; } };
  recog.onend = () => {
    if (recording && !manualStop) { clearTimeout(restartTimer); restartTimer = setTimeout(() => { if (recording && !manualStop && !starting) { starting = true; try { recog.start(); } catch { starting = false; } } }, 250); }
    else { setMicRecording(false); const t = finalText.trim(); finalText = ''; if (t) submitVoice(t); }
  };
  setMicRecording(true); tbar.textContent = '🎙 listening… (click mic to send)';
  starting = true; try { recog.start(); } catch { starting = false; }
  clearTimeout(silenceTimer); silenceTimer = setTimeout(endWebSpeech, SILENCE_MS);
}
function endWebSpeech() { manualStop = true; recording = false; clearTimeout(silenceTimer); clearTimeout(restartTimer); try { recog && recog.stop(); } catch {} }

mic.addEventListener('click', () => recording ? endVoice() : startVoice());

// ===================== wake word =====================
// Active now via always-on Web Speech (free, no key). Porcupine upgrade: add a free
// AccessKey at console.picovoice.ai → config.picovoiceKey, then the offline
// "Jarvis"/custom-keyword engine replaces this listener.
let wakeRecog = null;
function initWake() {
  if (!SR) return;
  const phrases = ['hey bhatbot', 'bhatbot', 'jarvis', String(voiceCfg.wakeWord || '').toLowerCase()].filter(Boolean);
  wakeRecog = new SR(); wakeRecog.lang = 'en-US'; wakeRecog.continuous = true; wakeRecog.interimResults = true;
  wakeRecog.onresult = (e) => {
    if (recording) return;            // ignore while capturing a command
    const heard = [...e.results].slice(-3).map((r) => r[0].transcript.toLowerCase()).join(' ');
    if (phrases.some((p) => heard.includes(p))) { try { wakeRecog.stop(); } catch {} startVoice(); }
  };
  wakeRecog.onerror = () => {};
  wakeRecog.onend = () => { setTimeout(() => { try { wakeRecog.start(); } catch {} }, 500); };
  try { wakeRecog.start(); } catch {}
}

// Wake word now handled by the offline openWakeWord helper (main process) → onWake → startVoice.
// Web-Speech wake (initWake) left in as a no-key fallback but disabled by default (unreliable in Electron).
(async () => {
  try {
    voiceCfg = (await window.bhatbot.getVoiceConfig()) || voiceCfg;
    SILENCE_MS = voiceCfg.silenceMs || SILENCE_MS;
    ttsOn = !!(voiceCfg.hasTTS && voiceCfg.ttsEnabled);   // auto-on if a TTS provider is configured
    setSpkUI();
    if (!voiceCfg.hasTTS) spk.style.opacity = '0.4';
  } catch {}
})();

ta.focus();
</script>

<!-- Embedded Claude Code terminal (xterm + pty over IPC) -->
<script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
<script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
<script>
'use strict';
(function () {
  const panel = document.getElementById('codepanel');
  const mount = document.getElementById('codeterm');
  let term = null, fit = null, started = false;

  function ensureTerm() {
    if (term || typeof Terminal === 'undefined' || typeof FitAddon === 'undefined') return;
    term = new Terminal({
      fontFamily: 'JetBrains Mono, monospace', fontSize: 13, cursorBlink: true,
      theme: { background: '#0a0f17', foreground: '#c8d6e5', cursor: '#00c8ff',
               black: '#0a0f17', brightBlack: '#46627d', blue: '#00c8ff', green: '#3dffb0', red: '#ff4d6a' }
    });
    fit = new FitAddon.FitAddon(); term.loadAddon(fit);
    term.open(mount);
    window.term.onData((d) => term.write(d));
    window.term.onExit(() => { term.write('\r\n\x1b[90m[claude code session ended — press ⟳ to restart]\x1b[0m\r\n'); started = false; });
    term.onData((d) => window.term.input(d));
  }
  function sync() { if (!fit) return; try { fit.fit(); window.term.resize(term.cols, term.rows); } catch {} }
  function startIfNeeded() { if (!started && term) { window.term.start(term.cols, term.rows); started = true; } }

  window.toggleCodePanel = function (forceOpen) {
    const open = forceOpen ? (panel.classList.add('open'), true) : panel.classList.toggle('open');
    if (open) { ensureTerm(); setTimeout(() => { sync(); startIfNeeded(); term && term.focus(); }, 60); }
  };
  document.getElementById('code-close').addEventListener('click', () => panel.classList.remove('open'));
  document.getElementById('code-restart').addEventListener('click', () => { started = false; if (term) term.reset(); startIfNeeded(); term && term.focus(); });
  window.addEventListener('resize', () => { if (panel.classList.contains('open')) sync(); });

  // drag the top grip to resize the panel height
  (function () {
    const grip = document.getElementById('codegrip'); let dragging = false;
    grip.addEventListener('mousedown', (e) => { dragging = true; e.preventDefault(); });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const h = window.innerHeight - e.clientY;
      panel.style.height = Math.max(140, Math.min(window.innerHeight - 60, h)) + 'px';
      sync();
    });
    window.addEventListener('mouseup', () => { if (dragging) { dragging = false; sync(); } });
  })();
})();
</script>

<!-- Holographic in-chat 3D viewer: slow Jarvis-style turntable for generate_3d /
     make_printable outputs, rendered with the same vendored three.js as viewer.html. -->
<script type="importmap">
{ "imports": {
  "three": "./vendor/three/three.module.js",
  "three/addons/": "./vendor/three/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const activeViewers = [];   // keep at most 2 spinning; older ones freeze on their last frame

window.holoSpin = function (mount, model) {
  const W = mount.clientWidth || 400, H = mount.clientHeight || 260;
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(W, H);
  mount.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, W / H, 0.01, 1000);
  scene.add(new THREE.HemisphereLight(0xbfe6ff, 0x07121c, 1.2));
  const key = new THREE.DirectionalLight(0xffffff, 1.5); key.position.set(1, 1.6, 1); scene.add(key);
  const rim = new THREE.DirectionalLight(0x00c8ff, 1.2); rim.position.set(-1.2, 0.4, -1); scene.add(rim);
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08; controls.enablePan = false;

  const group = new THREE.Group(); scene.add(group);
  const bytes = Uint8Array.from(atob(model.data), (c) => c.charCodeAt(0));

  function fit() {
    const box = new THREE.Box3().setFromObject(group);
    const size = box.getSize(new THREE.Vector3()); const center = box.getCenter(new THREE.Vector3());
    group.position.sub(center);
    const maxDim = Math.max(size.x, size.y, size.z) || 1;
    camera.position.set(maxDim * 1.4, maxDim * 0.85, maxDim * 1.8);
    camera.near = maxDim / 100; camera.far = maxDim * 50; camera.updateProjectionMatrix();
    controls.target.set(0, 0, 0);
  }

  let raf = 0;
  const stop = () => cancelAnimationFrame(raf);
  function spin() {
    activeViewers.push(stop);
    while (activeViewers.length > 2) (activeViewers.shift())();
    const loop = () => {
      group.rotation.y += 0.006;                 // slow holographic turntable
      controls.update();
      renderer.render(scene, camera);
      raf = requestAnimationFrame(loop);
    };
    loop();
  }

  try {
    if (model.ext === 'stl') {
      const geo = new STLLoader().parse(bytes.buffer);
      geo.computeVertexNormals();
      const mesh = new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({
        color: 0x35c4f0, metalness: 0.1, roughness: 0.35, transparent: true, opacity: 0.92, emissive: 0x06222e
      }));
      const wire = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x00c8ff, wireframe: true, transparent: true, opacity: 0.07 }));
      mesh.rotation.x = -Math.PI / 2; wire.rotation.x = -Math.PI / 2;   // STL z-up → y-up
      group.add(mesh, wire);
      fit(); spin();
    } else {
      new GLTFLoader().parse(bytes.buffer, '', (g) => { group.add(g.scene); fit(); spin(); },
        () => { mount.textContent = 'could not parse model'; });
    }
  } catch (e) { mount.textContent = 'preview failed: ' + e.message; }
};
</script>
</body>
</html>
